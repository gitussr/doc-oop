<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#080c14">
<meta name="description" content="Learn OOP in PHP - From Beginner to Advanced">
<title>PHP::OOP — Master Object Oriented Programming</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#080c14;--bg2:#0d1220;--bg3:#111827;--surface:#141c2e;--surface2:#1a2540;
    --border:#1e2d4a;--border2:#243354;
    --accent:#00d4ff;--accent2:#0099cc;--accent3:#00ff88;--accent4:#ff6b35;
    --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
    --glow:0 0 20px rgba(0,212,255,0.3);--glow2:0 0 40px rgba(0,212,255,0.15);
    --radius:8px;
    --font-display:'Orbitron',monospace;--font-mono:'Space Mono',monospace;--font-body:'Inter',sans-serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  #app{position:relative;z-index:1;display:flex;min-height:100vh}
  /* SIDEBAR */
  #sidebar{width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;transition:transform .3s cubic-bezier(.4,0,.2,1);overflow-y:auto}
  #sidebar::-webkit-scrollbar{width:4px}
  #sidebar::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
  .sidebar-header{padding:24px 20px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg2);z-index:2}
  .logo{font-family:var(--font-display);font-size:13px;font-weight:900;color:var(--accent);letter-spacing:2px;text-transform:uppercase;line-height:1;display:flex;align-items:center;gap:8px}
  .logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent3));border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:var(--bg);flex-shrink:0}
  .logo-sub{font-family:var(--font-mono);font-size:9px;color:var(--text3);letter-spacing:1px;margin-top:3px;font-weight:400}
  .progress-bar-wrap{margin-top:14px;background:var(--border);border-radius:2px;height:3px;overflow:hidden}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent3));border-radius:2px;transition:width .5s ease;box-shadow:0 0 8px var(--accent)}
  .progress-label{font-family:var(--font-mono);font-size:9px;color:var(--text3);letter-spacing:1px;margin-top:6px;display:flex;justify-content:space-between}
  .nav-section{padding:10px 0}
  .nav-section-label{font-family:var(--font-mono);font-size:9px;letter-spacing:2px;color:var(--text3);padding:10px 20px 6px;text-transform:uppercase}
  .nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;cursor:pointer;transition:all .15s;border-left:2px solid transparent}
  .nav-item:hover{background:rgba(0,212,255,0.05)}
  .nav-item.active{background:rgba(0,212,255,0.08);border-left-color:var(--accent)}
  .nav-item.active .nav-title{color:var(--accent)}
  .nav-num{font-family:var(--font-mono);font-size:9px;color:var(--text3);width:18px;flex-shrink:0}
  .nav-info{flex:1;min-width:0}
  .nav-title{font-size:12px;font-weight:500;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .nav-badge{font-family:var(--font-mono);font-size:8px;padding:2px 6px;border-radius:2px;flex-shrink:0}
  .badge-beginner{background:rgba(0,255,136,0.15);color:var(--accent3)}
  .badge-intermediate{background:rgba(0,212,255,0.15);color:var(--accent)}
  .badge-advanced{background:rgba(255,107,53,0.15);color:var(--accent4)}
  .nav-check{width:14px;height:14px;border:1px solid var(--border2);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;transition:all .2s}
  .nav-check.done{background:var(--accent3);border-color:var(--accent3);color:var(--bg);box-shadow:0 0 8px rgba(0,255,136,0.4)}
  /* MAIN */
  #main{margin-left:280px;flex:1;min-height:100vh;display:flex;flex-direction:column}
  #topbar{position:sticky;top:0;z-index:50;background:rgba(8,12,20,0.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:12px 32px;display:flex;align-items:center;gap:16px}
  #menu-btn{display:none;background:none;border:1px solid var(--border2);color:var(--text2);border-radius:var(--radius);padding:6px 10px;cursor:pointer;font-size:16px}
  .chapter-crumb{font-family:var(--font-mono);font-size:11px;color:var(--text3);letter-spacing:1px}
  .chapter-crumb span{color:var(--accent)}
  .topbar-actions{margin-left:auto;display:flex;gap:8px}
  .btn{font-family:var(--font-mono);font-size:11px;padding:7px 16px;border-radius:var(--radius);cursor:pointer;transition:all .15s;letter-spacing:1px;border:none;outline:none}
  .btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2)}
  .btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
  .btn-primary{background:var(--accent);color:var(--bg);font-weight:700}
  .btn-primary:hover{background:#00eeff;box-shadow:var(--glow);transform:translateY(-1px)}
  .btn-success{background:var(--accent3);color:var(--bg);font-weight:700}
  .btn-success:hover{box-shadow:0 0 16px rgba(0,255,136,0.4)}
  /* CONTENT */
  #content{flex:1;padding:40px 32px;max-width:860px;width:100%}
  /* HERO */
  .hero{padding:60px 0 40px;position:relative}
  .hero-tag{font-family:var(--font-mono);font-size:10px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:8px}
  .hero-tag::before{content:'';width:24px;height:1px;background:var(--accent)}
  .hero h1{font-family:var(--font-display);font-size:clamp(28px,4vw,48px);font-weight:900;line-height:1.1;letter-spacing:-1px;color:var(--text);margin-bottom:16px}
  .hero h1 .highlight{background:linear-gradient(90deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .hero p{font-size:15px;color:var(--text2);line-height:1.7;max-width:600px;margin-bottom:32px}
  .hero-stats{display:flex;gap:32px;flex-wrap:wrap}
  .stat{font-family:var(--font-mono)}
  .stat-num{font-size:24px;font-weight:700;color:var(--accent);line-height:1}
  .stat-label{font-size:10px;color:var(--text3);letter-spacing:1px;margin-top:4px}
  /* CHAPTER CARDS */
  .chapters-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-top:8px}
  .chapter-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
  .chapter-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent3));transform:scaleX(0);transform-origin:left;transition:transform .3s}
  .chapter-card:hover{border-color:var(--border2);transform:translateY(-2px);box-shadow:var(--glow2)}
  .chapter-card:hover::before{transform:scaleX(1)}
  .chapter-card.completed{border-color:rgba(0,255,136,0.2)}
  .chapter-card.completed::before{transform:scaleX(1);background:var(--accent3)}
  .card-num{font-family:var(--font-mono);font-size:10px;color:var(--text3);letter-spacing:1px;margin-bottom:6px}
  .card-title{font-family:var(--font-display);font-size:12px;font-weight:700;color:var(--text);letter-spacing:.5px;margin-bottom:6px;line-height:1.3}
  .card-desc{font-size:11px;color:var(--text3);line-height:1.5;margin-bottom:10px}
  .card-footer{display:flex;align-items:center;justify-content:space-between}
  /* CHAPTER VIEW */
  .chapter-view{animation:fadeUp .4s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
  .chapter-header{margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
  .chapter-header h2{font-family:var(--font-display);font-size:clamp(20px,3vw,30px);font-weight:900;color:var(--text);letter-spacing:-.5px;margin-bottom:8px}
  .chapter-meta{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-top:12px}
  .meta-pill{font-family:var(--font-mono);font-size:10px;padding:4px 10px;border-radius:4px;letter-spacing:1px}
  /* CONTENT */
  .content-section{margin-bottom:28px}
  .content-section h3{font-family:var(--font-display);font-size:13px;font-weight:700;color:var(--accent);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
  .content-section h3::after{content:'';flex:1;height:1px;background:var(--border)}
  .content-section p{font-size:14px;color:var(--text2);line-height:1.8;margin-bottom:10px}
  .content-section ul{list-style:none;margin-bottom:10px}
  .content-section ul li{font-size:13px;color:var(--text2);line-height:1.7;padding:3px 0;padding-left:18px;position:relative}
  .content-section ul li::before{content:'▸';position:absolute;left:0;color:var(--accent);font-size:10px;top:6px}
  /* CODE */
  .code-wrap{background:#060a11;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:14px 0}
  .code-header{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;justify-content:space-between}
  .code-lang{font-family:var(--font-mono);font-size:10px;color:var(--accent);letter-spacing:1px}
  .code-copy{font-family:var(--font-mono);font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;letter-spacing:1px;transition:color .15s}
  .code-copy:hover{color:var(--accent)}
  .code-body{padding:18px;overflow-x:auto}
  .code-body pre{font-family:var(--font-mono);font-size:12px;line-height:1.8;color:#cdd6f4;white-space:pre}
  .kw{color:#cba6f7}.fn{color:#89b4fa}.str{color:#a6e3a1}.cm{color:#585b70;font-style:italic}.num{color:#fab387}.cls{color:#f9e2af}.var{color:#cdd6f4}.op{color:#94e2d5}
  /* CALLOUT */
  .callout{border-radius:var(--radius);padding:14px 18px;margin:14px 0;border-left:3px solid;font-size:13px;line-height:1.6}
  .callout-info{background:rgba(0,212,255,0.08);border-color:var(--accent);color:var(--text2)}
  .callout-tip{background:rgba(0,255,136,0.08);border-color:var(--accent3);color:var(--text2)}
  .callout-warn{background:rgba(255,107,53,0.08);border-color:var(--accent4);color:var(--text2)}
  .callout strong{font-family:var(--font-mono);font-size:10px;letter-spacing:1px;display:block;margin-bottom:4px;text-transform:uppercase}
  .callout-info strong{color:var(--accent)}.callout-tip strong{color:var(--accent3)}.callout-warn strong{color:var(--accent4)}
  /* QUIZ */
  .quiz-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;margin-top:32px}
  .quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
  .quiz-title{font-family:var(--font-display);font-size:14px;font-weight:700;color:var(--text);letter-spacing:1px}
  .quiz-progress-text{font-family:var(--font-mono);font-size:11px;color:var(--text3);letter-spacing:1px}
  .question-block{animation:fadeUp .3s ease}
  .question-num{font-family:var(--font-mono);font-size:10px;color:var(--text3);letter-spacing:2px;margin-bottom:8px}
  .question-text{font-size:15px;color:var(--text);line-height:1.6;margin-bottom:18px;font-weight:500}
  .options{display:flex;flex-direction:column;gap:10px;margin-bottom:18px}
  .option{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .15s;background:var(--bg3)}
  .option:hover:not(.locked){border-color:var(--accent);background:rgba(0,212,255,0.05)}
  .option.selected{border-color:var(--accent);background:rgba(0,212,255,0.08)}
  .option.correct{border-color:var(--accent3);background:rgba(0,255,136,0.08)}
  .option.wrong{border-color:var(--accent4);background:rgba(255,107,53,0.08)}
  .option-letter{font-family:var(--font-mono);font-size:11px;color:var(--text3);width:20px;flex-shrink:0;padding-top:1px;font-weight:700}
  .option.selected .option-letter{color:var(--accent)}.option.correct .option-letter{color:var(--accent3)}.option.wrong .option-letter{color:var(--accent4)}
  .option-text{font-size:13px;color:var(--text2);line-height:1.5}
  .feedback{padding:12px 16px;border-radius:var(--radius);font-size:13px;line-height:1.5;margin-bottom:14px;display:none}
  .feedback.show{display:block;animation:fadeUp .25s ease}
  .feedback.correct-fb{background:rgba(0,255,136,0.1);border:1px solid rgba(0,255,136,0.2);color:var(--accent3)}
  .feedback.wrong-fb{background:rgba(255,107,53,0.1);border:1px solid rgba(255,107,53,0.2);color:var(--accent4)}
  .quiz-actions{display:flex;gap:12px;flex-wrap:wrap}
  /* RESULT */
  .quiz-result{text-align:center;padding:20px 0;animation:fadeUp .4s ease}
  .result-score{font-family:var(--font-display);font-size:64px;font-weight:900;line-height:1;background:linear-gradient(90deg,var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
  .result-label{font-family:var(--font-mono);font-size:12px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px}
  .result-message{font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:24px;max-width:400px;margin-inline:auto}
  /* NAV BTNS */
  .nav-btns{display:flex;gap:12px;margin-top:32px;padding-top:24px;border-top:1px solid var(--border)}
  .divider{height:1px;background:linear-gradient(90deg,var(--accent),transparent);margin:28px 0;opacity:.3}
  /* MOBILE */
  #overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:90}
  @media(max-width:768px){
    #sidebar{transform:translateX(-100%)}
    #sidebar.open{transform:translateX(0)}
    #main{margin-left:0}
    #menu-btn{display:block}
    #content{padding:24px 16px}
    #topbar{padding:12px 16px}
    #overlay.show{display:block}
    .hero{padding:32px 0 24px}
  }
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-track{background:var(--bg)}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
  code{font-family:var(--font-mono);font-size:12px;background:var(--surface2);padding:2px 6px;border-radius:4px;color:var(--accent)}
</style>
</head>
<body>
<div id="app">
  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">OOP</div>
        <div><div>PHP::CLASS</div><div class="logo-sub">OBJECT ORIENTED MASTERY</div></div>
      </div>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill" style="width:0%"></div></div>
      <div class="progress-label"><span>PROGRESS</span><span id="progressText">0 / 0</span></div>
    </div>
    <div id="navList"></div>
  </nav>
  <div id="overlay"></div>
  <main id="main">
    <div id="topbar">
      <button id="menu-btn" onclick="toggleSidebar()">☰</button>
      <div class="chapter-crumb" id="crumb">PHP::OOP &nbsp;/&nbsp; <span>Home</span></div>
      <div class="topbar-actions">
        <button class="btn btn-ghost" id="prevBtn" onclick="navigate(-1)" style="display:none">← PREV</button>
        <button class="btn btn-primary" id="nextBtn" onclick="navigate(1)" style="display:none">NEXT →</button>
      </div>
    </div>
    <div id="content"></div>
  </main>
</div>
<script>
const chapters = [
  {
    id:0,title:"Introduction to OOP",level:"beginner",desc:"What is OOP and why it matters",icon:"◈",
    content:{
      intro:`Object-Oriented Programming (OOP) is a paradigm that organizes code around <strong>objects</strong> — entities that bundle data and behavior together. PHP fully supports OOP, making code modular, reusable, and maintainable.`,
      sections:[
        {heading:"OOP vs Procedural",body:`Procedural PHP runs top-to-bottom with functions. OOP organizes logic into self-contained objects that interact with each other.`,
        code:`<span class="cm">// Procedural</span>
<span class="kw">function</span> <span class="fn">getFullName</span>(<span class="var">$first</span>, <span class="var">$last</span>) {
    <span class="kw">return</span> <span class="var">$first</span> <span class="op">.</span> <span class="str">' '</span> <span class="op">.</span> <span class="var">$last</span>;
}

<span class="cm">// OOP — data + behavior together</span>
<span class="kw">class</span> <span class="cls">Person</span> {
    <span class="kw">public function</span> <span class="fn">__construct</span>(
        <span class="kw">public</span> <span class="var">string</span> <span class="var">$firstName</span>,
        <span class="kw">public</span> <span class="var">string</span> <span class="var">$lastName</span>
    ) {}

    <span class="kw">public function</span> <span class="fn">getFullName</span>(): <span class="var">string</span> {
        <span class="kw">return</span> <span class="str">"{$this->firstName} {$this->lastName}"</span>;
    }
}

<span class="var">$p</span> <span class="op">=</span> <span class="kw">new</span> <span class="cls">Person</span>(<span class="str">'John'</span>, <span class="str">'Doe'</span>);
<span class="fn">echo</span> <span class="var">$p</span><span class="op">-></span><span class="fn">getFullName</span>(); <span class="cm">// John Doe</span>`},
        {heading:"The Four Pillars",body:`OOP is built on four core concepts:`,
        bullets:["<strong>Encapsulation</strong> — Bundle data + behavior, hide internals","<strong>Inheritance</strong> — Child classes inherit parent features","<strong>Polymorphism</strong> — Same interface, different implementations","<strong>Abstraction</strong> — Hide complexity, expose only essentials"]}
      ],
      callout:{type:"info",title:"WHY LEARN OOP?",text:"Every major PHP framework — Laravel, Symfony, Yii — is built entirely on OOP. It is the foundation of professional PHP development."}
    },
    quiz:[
      {q:"What does OOP stand for?",opts:["Object-Oriented Programming","Operational Output Processing","Object-Output Protocol","Oriented Object Procedure"],correct:0,explain:"OOP = Object-Oriented Programming. A paradigm organizing code around objects that bundle data and behavior."},
      {q:"Which of the following is NOT one of the four pillars of OOP?",opts:["Encapsulation","Inheritance","Compilation","Polymorphism"],correct:2,explain:"Compilation is not an OOP pillar. The four pillars are: Encapsulation, Inheritance, Polymorphism, and Abstraction."},
      {q:"In OOP, what is an object?",opts:["A function that returns data","An instance of a class","A type of variable","A loop structure"],correct:1,explain:"An object is a concrete instance created from a class blueprint."}
    ]
  },
  {
    id:1,title:"Classes & Objects",level:"beginner",desc:"Blueprints, instances and $this",icon:"⬡",
    content:{
      intro:`A <strong>class</strong> is a blueprint. An <strong>object</strong> is a specific instance created from that blueprint. <code>$this</code> refers to the current object inside methods.`,
      sections:[
        {heading:"Defining Classes & Creating Objects",body:`Use the <code>class</code> keyword to define, and <code>new</code> to instantiate.`,
        code:`<span class="kw">class</span> <span class="cls">Car</span> {
    <span class="kw">public</span> <span class="var">string</span> <span class="var">$brand</span>;
    <span class="kw">public</span> <span class="var">int</span>    <span class="var">$speed</span> <span class="op">=</span> <span class="num">0</span>;

    <span class="kw">public function</span> <span class="fn">accelerate</span>(<span class="var">int</span> <span class="var">$amount</span>): <span class="var">void</span> {
        <span class="var">$this</span><span class="op">-></span><span class="var">speed</span> <span class="op">+=</span> <span class="var">$amount</span>;
        <span class="fn">echo</span> <span class="str">"Speed: {$this->speed} km/h\n"</span>;
    }

    <span class="kw">public function</span> <span class="fn">brake</span>(): <span class="var">void</span> {
        <span class="var">$this</span><span class="op">-></span><span class="var">speed</span> <span class="op">=</span> <span class="num">0</span>;
        <span class="fn">echo</span> <span class="str">"Stopped.\n"</span>;
    }
}

<span class="var">$tesla</span> <span class="op">=</span> <span class="kw">new</span> <span class="cls">Car</span>();   <span class="cm">// Create object</span>
<span class="var">$tesla</span><span class="op">-></span><span class="var">brand</span> <span class="op">=</span> <span class="str">'Tesla'</span>;
<span class="var">$tesla</span><span class="op">-></span><span class="fn">accelerate</span>(<span class="num">60</span>); <span class="cm">// Speed: 60 km/h</span>

<span class="var">$bmw</span> <span class="op">=</span> <span class="kw">new</span> <span class="cls">Car</span>();     <span class="cm">// Separate independent object</span>
<span class="var">$bmw</span><span class="op">-></span><span class="var">brand</span> <span class="op">=</span> <span class="str">'BMW'</span>;
<span class="var">$bmw</span><span class="op">-></span><span class="fn">accelerate</span>(<span class="num">100</span>); <span class="cm">// Speed: 100 km/h</span>`}
      ],
      callout:{type:"tip",title:"NAMING CONVENTION",text:"Class names use PascalCase (MyClass). Properties and methods use camelCase (myMethod). This follows PSR-12 standard."}
    },
    quiz:[
      {q:"What keyword creates an instance of a class?",opts:["create","instance","new","make"],correct:2,explain:"The 'new' keyword instantiates: $obj = new MyClass();"},
      {q:"What does $this refer to inside a class method?",opts:["The class itself","The current object instance","The parent class","A static variable"],correct:1,explain:"$this refers to the object the method is currently being called on."},
      {q:"Which naming convention is used for PHP class names?",opts:["snake_case","camelCase","PascalCase","UPPER_CASE"],correct:2,explain:"PHP class names use PascalCase per PSR-12: UserAccount, ShoppingCart, etc."}
    ]
  },
  {
    id:2,title:"Constructors & Destructors",level:"beginner",desc:"__construct, __destruct & PHP 8 promotion",icon:"⟳",
    content:{
      intro:`The <strong>constructor</strong> (<code>__construct</code>) runs automatically when an object is created. The <strong>destructor</strong> (<code>__destruct</code>) runs when the object is garbage collected.`,
      sections:[
        {heading:"Constructor & PHP 8 Promotion",body:`PHP 8 introduced constructor property promotion — declare and assign properties directly in constructor parameters.`,
        code:`<span class="cm">// Traditional</span>
<span class="kw">class</span> <span class="cls">UserOld</span> {
    <span class="kw">public</span> <span class="var">string</span> <span class="var">$name</span>;
    <span class="kw">public</span> <span class="var">string</span> <span class="var">$email</span>;
    <span class="kw">public function</span> <span class="fn">__construct</span>(<span class="var">string</span> <span class="var">$name</span>, <span class="var">string</span> <span class="var">$email</span>) {
        <span class="var">$this</span><span class="op">-></span><span class="var">name</span>  <span class="op">=</span> <span class="var">$name</span>;
        <span class="var">$this</span><span class="op">-></span><span class="var">email</span> <span class="op">=</span> <span class="var">$email</span>;
    }
}

<span class="cm">// PHP 8+ Promotion — much cleaner!</span>
<span class="kw">class</span> <span class="cls">User</span> {
    <span class="kw">public function</span> <span class="fn">__construct</span>(
        <span class="kw">public readonly</span> <span class="var">string</span> <span class="var">$name</span>,
        <span class="kw">public readonly</span> <span class="var">string</span> <span class="var">$email</span>,
        <span class="kw">private</span> <span class="var">int</span> <span class="var">$role</span> <span class="op">=</span> <span class="num">1</span>
    ) {
        <span class="fn">echo</span> <span class="str">"User '{$name}' created.\n"</span>;
    }

    <span class="kw">public function</span> <span class="fn">__destruct</span>() {
        <span class="fn">echo</span> <span class="str">"User '{$this->name}' cleaned up.\n"</span>;
    }
}

<span class="var">$u</span> <span class="op">=</span> <span class="kw">new</span> <span class="cls">User</span>(<span class="str">'Alice'</span>, <span class="str">'alice@dev.io'</span>);
<span class="fn">echo</span> <span class="var">$u</span><span class="op">-></span><span class="var">name</span>;  <span class="cm">// Alice</span>
<span class="fn">echo</span> <span class="var">$u</span><span class="op">-></span><span class="var">email</span>; <span class="cm">// alice@dev.io</span>
<span class="cm">// At script end: User 'Alice' cleaned up.</span>`}
      ],
      callout:{type:"tip",title:"PHP 8 TIP",text:"Always use constructor promotion for data classes and DTOs. It eliminates duplicate property declarations and is PSR-12 compliant."}
    },
    quiz:[
      {q:"Which magic method runs automatically when an object is created?",opts:["__create()","__init()","__construct()","__start()"],correct:2,explain:"__construct() is the constructor, called automatically when 'new ClassName()' is executed."},
      {q:"What does PHP 8 constructor property promotion do?",opts:["Automatically creates getters","Allows declaring and assigning properties in constructor parameters","Prevents property mutation","Enables late static binding"],correct:1,explain:"Constructor promotion lets you write 'public string $name' directly in the constructor signature, auto-creating the property."},
      {q:"When is __destruct() called?",opts:["When you call unset() only","Only on script errors","When the object is no longer referenced or script ends","When the class is re-declared"],correct:2,explain:"__destruct() is called automatically when PHP's garbage collector destroys the object — typically at end of scope or script."}
    ]
  },
  {
    id:3,title:"Access Modifiers & Encapsulation",level:"beginner",desc:"public, protected, private & getters/setters",icon:"🔐",
    content:{
      intro:`<strong>Encapsulation</strong> hides internal state and exposes only what's necessary. PHP's three modifiers — <code>public</code>, <code>protected</code>, <code>private</code> — control visibility.`,
      sections:[
        {heading:"The Three Modifiers",body:`Each modifier controls where a class member can be accessed from.`,
        bullets:["<strong>public</strong> — Accessible from anywhere","<strong>protected</strong> — Only inside the class and subclasses","<strong>private</strong> — Only inside the declaring class itself"],
        code:`<span class="kw">class</span> <span class="cls">BankAccount</span> {
    <span class="kw">public</span>    <span class="var">string</span> <span class="var">$owner</span>;
    <span class="kw">protected</span> <span class="var">float</span>  <span class="var">$balance</span> <span class="op">=</span> <span class="num">0.0</span>;
    <span class="kw">private</span>   <span class="var">string</span> <span class="var">$pin</span>;

    <span class="kw">public function</span> <span class="fn">__construct</span>(<span class="var">string</span> <span class="var">$owner</span>, <span class="var">string</span> <span class="var">$pin</span>) {
        <span class="var">$this</span><span class="op">-></span><span class="var">owner</span> <span class="op">=</span> <span class="var">$owner</span>;
        <span class="var">$this</span><span class="op">-></span><span class="var">pin</span>   <span class="op">=</span> <span class="fn">password_hash</span>(<span class="var">$pin</span>, PASSWORD_BCRYPT);
    }

    <span class="kw">public function</span> <span class="fn">deposit</span>(<span class="var">float</span> <span class="var">$amount</span>): <span class="var">void</span> {
        <span class="kw">if</span> (<span class="var">$amount</span> <span class="op">&lt;=</span> <span class="num">0</span>) <span class="kw">throw new</span> <span class="cls">InvalidArgumentException</span>(<span class="str">'Must be positive'</span>);
        <span class="var">$this</span><span class="op">-></span><span class="var">balance</span> <span class="op">+=</span> <span class="var">$amount</span>;
    }

    <span class="kw">public function</span> <span class="fn">getBalance</span>(): <span class="var">float</span> { <span class="kw">return</span> <span class="var">$this</span><span class="op">-></span><span class="var">balance</span>; }

    <span class="kw">private function</span> <span class="fn">validatePin</span>(<span class="var">string</span> <span class="var">$pin</span>): <span class="var">bool</span> {
        <span class="kw">return</span> <span class="fn">password_verify</span>(<span class="var">$pin</span>, <span class="var">$this</span><span class="op">-></span><span class="var">pin</span>);
    }
}

<span class="var">$acc</span> <span class="op">=</span> <span class="kw">new</span> <span class="cls">BankAccount</span>(<span class="str">'Alice'</span>, <span class="str">'1234'</span>);
<span class="var">$acc</span><span class="op">-></span><span class="fn">deposit</span>(<span class="num">500</span>);
<span class="fn">echo</span> <span class="var">$acc</span><span class="op">-></span><span class="fn">getBalance</span>(); <span class="cm">// 500</span>
<span class="cm">// echo $acc->pin; — Fatal Error! Private</span>`}
      ],
      callout:{type:"warn",title:"BEST PRACTICE",text:"Default to private for all properties. Use protected only when child classes need access. Expose data through public getters/setters with validation logic."}
    },
    quiz:[
      {q:"Which modifier makes a property accessible only within the declaring class?",opts:["public","protected","private","internal"],correct:2,explain:"private restricts access strictly to the class where it's declared — not even child classes can access it."},
      {q:"Which modifier allows child classes to access a property but hides it from outside?",opts:["private","protected","public","readonly"],correct:1,explain:"protected allows access from the class itself and any subclasses, but not from outside the class hierarchy."},
      {q:"What is the main purpose of encapsulation?",opts:["Faster code execution","Hide implementation and protect data integrity","Enable multiple inheritance","Reduce memory usage"],correct:1,explain:"Encapsulation hides internal state and exposes only a controlled public interface, preventing unexpected mutations."}
    ]
  },
  {
    id:4,title:"Inheritance",level:"beginner",desc:"extends, method overriding & parent::",icon:"⬆",
    content:{
      intro:`<strong>Inheritance</strong> allows a class to inherit properties and methods from a parent class using <code>extends</code>. Child classes can override parent methods and call parent implementations with <code>parent::</code>.`,
      sections:[
        {heading:"extends & Method Overriding",body:`Child classes get all public and protected members of the parent, and can override any of them.`,
        code:`<span class="kw">class</span> <span class="cls">Animal</span> {
    <span class="kw">public function</span> <span class="fn">__construct</span>(<span class="kw">protected</span> <span class="var">string</span> <span class="var">$name</span>) {}

    <span class="kw">public function</span> <span class="fn">speak</span>(): <span class="var">string</span> {
        <span class="kw">return</span> <span class="str">"{$this->name} makes a sound."</span>;
    }
    <span class="kw">public function</span> <span class="fn">describe</span>(): <span class="var">string</span> {
        <span class="kw">return</span> <span class="str">"I am {$this->name}."</span>;
    }
}

<span class="kw">class</span> <span class="cls">Dog</span> <span class="kw">extends</span> <span class="cls">Animal</span> {
    <span class="kw">public function</span> <span class="fn">__construct</span>(<span class="var">string</span> <span class="var">$name</span>, <span class="kw">private</span> <span class="var">string</span> <span class="var">$breed</span>) {
        <span class="kw">parent</span>::<span class="fn">__construct</span>(<span class="var">$name</span>); <span class="cm">// Call parent</span>
    }
    <span class="kw">public function</span> <span class="fn">speak</span>(): <span class="var">string</span> { <span class="cm">// Override</span>
        <span class="kw">return</span> <span class="str">"{$this->name} barks: Woof!"</span>;
    }
    <span class="kw">public function</span> <span class="fn">describe</span>(): <span class="var">string</span> {
        <span class="kw">return</span> <span class="kw">parent</span>::<span class="fn">describe</span>() <span class="op">.</span> <span class="str">" I'm a {$this->breed}."</span>;
    }
}

<span class="var">$d</span> <span class="op">=</span> <span class="kw">new</span> <span class="cls">Dog</span>(<span class="str">'Rex'</span>, <span class="str">'Labrador'</span>);
<span class="fn">echo</span> <span class="var">$d</span><span class="op">-></span><span class="fn">speak</span>();    <span class="cm">// Rex barks: Woof!</span>
<span class="fn">echo</span> <span class="var">$d</span><span class="op">-></span><span class="fn">describe</span>(); <span class="cm">// I am Rex. I'm a Labrador.</span>

<span class="cm">// final prevents overriding / extending</span>
<span class="kw">final class</span> <span class="cls">ImmutableConfig</span> <span class="kw">extends</span> <span class="cls">Animal</span> {} <span class="cm">// Can't be extended</span>`}
      ],
      callout:{type:"info",title:"SINGLE INHERITANCE",text:"PHP supports single inheritance only — one parent class. For multiple behaviors, use Interfaces and Traits (covered in Chapters 6 & 7)."}
    },
    quiz:[
      {q:"Which keyword inherits from a parent class?",opts:["implements","inherits","extends","uses"],correct:2,explain:"'extends' creates inheritance: class Child extends Parent { ... }"},
      {q:"How do you call the parent constructor from a child class?",opts:["super()","parent::__construct()","base::__construct()","$parent->__construct()"],correct:1,explain:"parent::__construct() calls the immediate parent class constructor."},
      {q:"What does marking a class 'final' do?",opts:["Prevents instantiation","Prevents the class from being extended","Makes all methods private","Removes access modifiers"],correct:1,explain:"A final class cannot be subclassed. A final method cannot be overridden in child classes."}
    ]
  },
  {
    id:5,title:"Interfaces & Abstract Classes",level:"intermediate",desc:"Contracts, blueprints and polymorphism",icon:"◻",
    content:{
      intro:`<strong>Interfaces</strong> define contracts — methods a class must implement. <strong>Abstract classes</strong> provide partial implementations. Both enable polymorphism.`,
      sections:[
        {heading:"Interfaces",body:`All interface methods are implicitly public and abstract. A class can implement multiple interfaces.`,
        code:`<span class="kw">interface</span> <span class="cls">Drawable</span> {
    <span class="kw">public function</span> <span class="fn">draw</span>(): <span class="var">string</span>;
}
<span class="kw">interface</span> <span class="cls">Resizable</span> {
    <span class="kw">public function</span> <span class="fn">resize</span>(<span class="var">float</span> <span class="var">$factor</span>): <span class="var">void</span>;
}

<span class="kw">class</span> <span class="cls">Circle</span> <span class="kw">implements</span> <span class="cls">Drawable</span>, <span class="cls">Resizable</span> {
    <span class="kw">public function</span> <span class="fn">__construct</span>(<span class="kw">private</span> <span class="var">float</span> <span class="var">$r</span>) {}
    <span class="kw">public function</span> <span class="fn">draw</span>(): <span class="var">string</span> { <span class="kw">return</span> <span class="str">"Circle r={$this->r}"</span>; }
    <span class="kw">public function</span> <span class="fn">resize</span>(<span class="var">float</span> <span class="var">$f</span>): <span class="var">void</span> { <span class="var">$this</span><span class="op">-></span><span class="var">r</span> <span class="op">*=</span> <span class="var">$f</span>; }
}`,},
        {heading:"Abstract Classes",body:`Cannot be instantiated. Can have concrete + abstract methods. Use for related classes sharing some implementation.`,
        code:`<span class="kw">abstract class</span> <span class="cls">Shape</span> {
    <span class="kw">abstract public function</span> <span class="fn">area</span>(): <span class="var">float</span>;
    <span class="kw">abstract public function</span> <span class="fn">perimeter</span>(): <span class="var">float</span>;

    <span class="cm">// Concrete — shared by all shapes</span>
    <span class="kw">public function</span> <span class="fn">describe</span>(): <span class="var">string</span> {
        <span class="kw">return</span> <span class="fn">sprintf</span>(<span class="str">"%s — Area: %.2f"</span>, <span class="fn">get_class</span>(<span class="var">$this</span>), <span class="var">$this</span><span class="op">-></span><span class="fn">area</span>());
    }
}

<span class="kw">class</span> <span class="cls">Rectangle</span> <span class="kw">extends</span> <span class="cls">Shape</span> {
    <span class="kw">public function</span> <span class="fn">__construct</span>(<span class="kw">private</span> <span class="var">float</span> <span class="var">$w</span>, <span class="kw">private</span> <span class="var">float</span> <span class="var">$h</span>) {}
    <span class="kw">public function</span> <span class="fn">area</span>(): <span class="var">float</span>      { <span class="kw">return</span> <span class="var">$this</span><span class="op">-></span><span class="var">w</span> <span class="op">*</span> <span class="var">$this</span><span class="op">-></span><span class="var">h</span>; }
    <span class="kw">public function</span> <span class="fn">perimeter</span>(): <span class="var">float</span> { <span class="kw">return</span> <span class="num">2</span> <span class="op">*</span> (<span class="var">$this</span><span class="op">-></span><span class="var">w</span> <span class="op">+</span> <span class="var">$this</span><span class="op">-></span><span class="var">h</span>); }
}

<span class="var">$r</span> <span class="op">=</span> <span class="kw">new</span> <span class="cls">Rectangle</span>(<span class="num">5</span>, <span class="num">3</span>);
<span class="fn">echo</span> <span class="var">$r</span><span class="op">-></span><span class="fn">describe</span>(); <span class="cm">// Rectangle — Area: 15.00</span>`}
      ],
      callout:{type:"info",title:"WHEN TO USE WHICH",text:"Interfaces = capability contracts for unrelated classes. Abstract classes = shared implementation for related classes. You can extend one abstract class AND implement multiple interfaces simultaneously."}
    },
    quiz:[
      {q:"Can a class implement multiple interfaces?",opts:["No, only one","Yes, separated by commas","Only with abstract classes","Only PHP 8+"],correct:1,explain:"class Foo implements Bar, Baz { ... } — multiple interfaces are allowed."},
      {q:"Can you instantiate an abstract class?",opts:["Yes with new","No — must be subclassed","Only in PHP 8","If all methods are concrete"],correct:1,explain:"Abstract classes cannot be instantiated. They must be extended by a concrete class that implements all abstract methods."},
      {q:"What is the key difference between interface and abstract class?",opts:["Interfaces allow concrete methods","Abstract classes support state and concrete methods; interfaces only define signatures","Interfaces use 'extends'","There is none"],correct:1,explain:"Abstract classes can have properties and concrete methods. Interfaces (pre-8.0) only declare method signatures with no implementation."}
    ]
  },
  {
    id:6,title:"Traits",level:"intermediate",desc:"Horizontal code reuse — mixins for PHP",icon:"⧉",
    content:{
      intro:`<strong>Traits</strong> solve PHP's single-inheritance limitation. They are reusable code mixins — include them in any class with <code>use</code>, without inheritance chains.`,
      sections:[
        {heading:"Defining and Using Traits",body:`A trait is like a class but cannot be instantiated. It provides methods and properties to any class that uses it.`,
        code:`<span class="kw">trait</span> <span class="cls">Timestampable</span> {
    <span class="kw">private</span> <span class="var">?DateTime</span> <span class="var">$createdAt</span> <span class="op">=</span> <span class="kw">null</span>;
    <span class="kw">private</span> <span class="var">?DateTime</span> <span class="var">$updatedAt</span> <span class="op">=</span> <span class="kw">null</span>;

    <span class="kw">public function</span> <span class="fn">touch</span>(): <span class="var">void</span> {
        <span class="var">$this</span><span class="op">-></span><span class="var">createdAt</span> <span class="op">??=</span> <span class="kw">new</span> <span class="cls">DateTime</span>();
        <span class="var">$this</span><span class="op">-></span><span class="var">updatedAt</span>   <span class="op">=</span> <span class="kw">new</span> <span class="cls">DateTime</span>();
    }
    <span class="kw">public function</span> <span class="fn">getUpdatedAt</span>(): <span class="var">?DateTime</span> { <span class="kw">return</span> <span class="var">$this</span><span class="op">-></span><span class="var">updatedAt</span>; }
}

<span class="kw">trait</span> <span class="cls">SoftDeletable</span> {
    <span class="kw">private</span> <span class="var">bool</span> <span class="var">$deleted</span> <span class="op">=</span> <span class="kw">false</span>;
    <span class="kw">public function</span> <span class="fn">delete</span>(): <span class="var">void</span>    { <span class="var">$this</span><span class="op">-></span><span class="var">deleted</span> <span class="op">=</span> <span class="kw">true</span>; }
    <span class="kw">public function</span> <span class="fn">restore</span>(): <span class="var">void</span>   { <span class="var">$this</span><span class="op">-></span><span class="var">deleted</span> <span class="op">=</span> <span class="kw">false</span>; }
    <span class="kw">public function</span> <span class="fn">isDeleted</span>(): <span class="var">bool</span> { <span class="kw">return</span> <span class="var">$this</span><span class="op">-></span><span class="var">deleted</span>; }
}

<span class="kw">class</span> <span class="cls">Post</span> {
    <span class="kw">use</span> <span class="cls">Timestampable</span>, <span class="cls">SoftDeletable</span>; <span class="cm">// Multiple traits!</span>
    <span class="kw">public function</span> <span class="fn">__construct</span>(<span class="kw">public</span> <span class="var">string</span> <span class="var">$title</span>) {
        <span class="var">$this</span><span class="op">-></span><span class="fn">touch</span>();
    }
}

<span class="var">$post</span> <span class="op">=</span> <span class="kw">new</span> <span class="cls">Post</span>(<span class="str">'Hello World'</span>);
<span class="var">$post</span><span class="op">-></span><span class="fn">delete</span>();
<span class="fn">var_dump</span>(<span class="var">$post</span><span class="op">-></span><span class="fn">isDeleted</span>()); <span class="cm">// bool(true)</span>`}
      ],
      callout:{type:"tip",title:"TRAITS vs INHERITANCE",text:"Traits are for horizontal reuse (logging, timestamps, auditing). Inheritance is for 'is-a' relationships. Traits solve the multiple-inheritance problem cleanly."}
    },
    quiz:[
      {q:"Which keyword includes a trait inside a class?",opts:["include","extends","use","import"],correct:2,explain:"class MyClass { use MyTrait; } — the 'use' keyword inside a class body includes a trait."},
      {q:"Can a class use multiple traits?",opts:["No, only one","Yes, comma-separated","Only abstract classes","Only with interfaces"],correct:1,explain:"use TraitA, TraitB, TraitC; — multiple traits can be used together."},
      {q:"What problem do traits primarily solve?",opts:["Memory management","Code reuse without multiple inheritance","Type checking","Autoloading"],correct:1,explain:"PHP has single inheritance. Traits allow reusing method sets across unrelated class hierarchies."}
    ]
  },
  {
    id:7,title:"Static Properties & Methods",level:"intermediate",desc:"Class-level members & the :: operator",icon:"⬛",
    content:{
      intro:`<strong>Static</strong> members belong to the class, not instances. All objects share the same static property. Access with <code>ClassName::</code> or <code>self::</code> inside the class.`,
      sections:[
        {heading:"Static Members & Factory Pattern",body:`Static methods are commonly used for counters, registries, and factory methods.`,
        code:`<span class="kw">class</span> <span class="cls">Counter</span> {
    <span class="kw">private static</span> <span class="var">int</span> <span class="var">$count</span> <span class="op">=</span> <span class="num">0</span>;

    <span class="kw">public function</span> <span class="fn">__construct</span>() { <span class="var">self</span>::<span class="var">$count</span>++; }

    <span class="kw">public static function</span> <span class="fn">getCount</span>(): <span class="var">int</span>  { <span class="kw">return</span> <span class="var">self</span>::<span class="var">$count</span>; }
    <span class="kw">public static function</span> <span class="fn">reset</span>(): <span class="var">void</span>    { <span class="var">self</span>::<span class="var">$count</span> <span class="op">=</span> <span class="num">0</span>; }
}

<span class="kw">new</span> <span class="cls">Counter</span>(); <span class="kw">new</span> <span class="cls">Counter</span>(); <span class="kw">new</span> <span class="cls">Counter</span>();
<span class="fn">echo</span> <span class="cls">Counter</span>::<span class="fn">getCount</span>(); <span class="cm">// 3</span>

<span class="cm">// Static Factory Pattern</span>
<span class="kw">class</span> <span class="cls">Color</span> {
    <span class="kw">private function</span> <span class="fn">__construct</span>(
        <span class="kw">public readonly</span> <span class="var">int</span> <span class="var">$r</span>,
        <span class="kw">public readonly</span> <span class="var">int</span> <span class="var">$g</span>,
        <span class="kw">public readonly</span> <span class="var">int</span> <span class="var">$b</span>
    ) {}

    <span class="kw">public static function</span> <span class="fn">fromHex</span>(<span class="var">string</span> <span class="var">$hex</span>): <span class="var">static</span> {
        <span class="var">$hex</span> <span class="op">=</span> <span class="fn">ltrim</span>(<span class="var">$hex</span>, <span class="str">'#'</span>);
        <span class="kw">return</span> <span class="kw">new</span> <span class="var">static</span>(
            <span class="fn">hexdec</span>(<span class="fn">substr</span>(<span class="var">$hex</span>,<span class="num">0</span>,<span class="num">2</span>)),
            <span class="fn">hexdec</span>(<span class="fn">substr</span>(<span class="var">$hex</span>,<span class="num">2</span>,<span class="num">2</span>)),
            <span class="fn">hexdec</span>(<span class="fn">substr</span>(<span class="var">$hex</span>,<span class="num">4</span>,<span class="num">2</span>))
        );
    }
    <span class="kw">public static function</span> <span class="fn">red</span>(): <span class="var">static</span> { <span class="kw">return</span> <span class="var">static</span>::<span class="fn">fromHex</span>(<span class="str">'FF0000'</span>); }
}

<span class="var">$c</span> <span class="op">=</span> <span class="cls">Color</span>::<span class="fn">fromHex</span>(<span class="str">'#1E90FF'</span>);
<span class="fn">echo</span> <span class="str">"{$c->r}, {$c->g}, {$c->b}"</span>; <span class="cm">// 30, 144, 255</span>`}
      ],
      callout:{type:"warn",title:"CAUTION",text:"Overusing static methods creates hidden global state and makes unit testing hard. Prefer dependency injection over static singletons in production code."}
    },
    quiz:[
      {q:"How do you access a static method from inside the same class?",opts:["$this->method()","self::method()","parent::method()","static->method()"],correct:1,explain:"self::method() references static members within the class. $this cannot be used for static context."},
      {q:"What operator accesses static members from outside the class?",opts:["->","=>","::","::>"],correct:2,explain:"The scope resolution operator :: is used: ClassName::$prop or ClassName::method()"},
      {q:"Are static properties shared across all instances?",opts:["No, each has its own","Yes, they are class-level","Only if public","Only in child classes"],correct:1,explain:"Static properties belong to the class itself — not to any instance. All objects share the same static property value."}
    ]
