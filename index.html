  {
    id:8,title:"Magic Methods",level:"intermediate",desc:"__toString, __get, __set, __call & more",icon:"✦",
    content:{
      intro:`PHP's <strong>magic methods</strong> (prefixed <code>__</code>) are automatically triggered by specific language events. They enable metaprogramming, dynamic properties, and fluent interfaces.`,
      sections:[
        {heading:"Core Magic Methods",body:`The most commonly used magic methods in production PHP code.`,
        code:`<span class="kw">class</span> <span class="cls">FluentRecord</span> {
    <span class="kw">private</span> <span class="var">array</span> <span class="var">$data</span> <span class="op">=</span> [];

    <span class="cm">// Dynamic property write</span>
    <span class="kw">public function</span> <span class="fn">__set</span>(<span class="var">string</span> <span class="var">$k</span>, <span class="kw">mixed</span> <span class="var">$v</span>): <span class="var">void</span>  { <span class="var">$this</span><span class="op">-></span><span class="var">data</span>[<span class="var">$k</span>] <span class="op">=</span> <span class="var">$v</span>; }
    <span class="cm">// Dynamic property read</span>
    <span class="kw">public function</span> <span class="fn">__get</span>(<span class="var">string</span> <span class="var">$k</span>): <span class="kw">mixed</span>           { <span class="kw">return</span> <span class="var">$this</span><span class="op">-></span><span class="var">data</span>[<span class="var">$k</span>] <span class="op">??</span> <span class="kw">null</span>; }
    <span class="cm">// isset() on dynamic props</span>
    <span class="kw">public function</span> <span class="fn">__isset</span>(<span class="var">string</span> <span class="var">$k</span>): <span class="var">bool</span>          { <span class="kw">return</span> <span class="fn">isset</span>(<span class="var">$this</span><span class="op">-></span><span class="var">data</span>[<span class="var">$k</span>]); }
    <span class="cm">// Object used as string</span>
    <span class="kw">public function</span> <span class="fn">__toString</span>(): <span class="var">string</span>              { <span class="kw">return</span> <span class="fn">json_encode</span>(<span class="var">$this</span><span class="op">-></span><span class="var">data</span>); }
    <span class="cm">// Object called as function</span>
    <span class="kw">public function</span> <span class="fn">__invoke</span>(<span class="var">string</span> <span class="var">$key</span>): <span class="kw">mixed</span>      { <span class="kw">return</span> <span class="var">$this</span><span class="op">-></span><span class="var">data</span>[<span class="var">$key</span>] <span class="op">??</span> <span class="kw">null</span>; }
    <span class="cm">// Unknown method call — fluent builder</span>
    <span class="kw">public function</span> <span class="fn">__call</span>(<span class="var">string</span> <span class="var">$name</span>, <span class="var">array</span> <span class="var">$args</span>): <span class="var">static</span> {
        <span class="kw">if</span> (<span class="fn">str_starts_with</span>(<span class="var">$name</span>, <span class="str">'set'</span>)) {
            <span class="var">$prop</span> <span class="op">=</span> <span class="fn">lcfirst</span>(<span class="fn">substr</span>(<span class="var">$name</span>, <span class="num">3</span>));
            <span class="var">$this</span><span class="op">-></span><span class="var">data</span>[<span class="var">$prop</span>] <span class="op">=</span> <span class="var">$args</span>[<span class="num">0</span>];
        }
        <span class="kw">return</span> <span class="var">$this</span>; <span class="cm">// Enable chaining</span>
    }
}

<span class="var">$rec</span> <span class="op">=</span> <span class="kw">new</span> <span class="cls">FluentRecord</span>();
<span class="var">$rec</span><span class="op">-></span><span class="fn">setName</span>(<span class="str">'Alice'</span>)<span class="op">-></span><span class="fn">setAge</span>(<span class="num">30</span>)<span class="op">-></span><span class="fn">setRole</span>(<span class="str">'admin'</span>);
<span class="fn">echo</span> <span class="var">$rec</span>;         <span class="cm">// {"name":"Alice","age":30,"role":"admin"}</span>
<span class="fn">echo</span> <span class="var">$rec</span>(<span class="str">'name'</span>); <span class="cm">// Alice — uses __invoke</span>`}
      ],
      callout:{type:"info",title:"MAGIC METHOD REFERENCE",text:"__construct __destruct __get __set __isset __unset __call __callStatic __toString __invoke __clone __sleep __wakeup __serialize __unserialize __debugInfo"}
    },
    quiz:[
      {q:"Which magic method is triggered when an object is used as a string?",opts:["__string()","__cast()","__toString()","__print()"],correct:2,explain:"__toString() is called automatically when the object is used in a string context (echo, concatenation, etc.)."},
      {q:"What does __get() do?",opts:["Returns all properties","Called when accessing inaccessible/nonexistent property","Gets the class name","Initializes private properties"],correct:1,explain:"__get($name) intercepts reads to undefined or inaccessible properties, enabling dynamic property systems."},
      {q:"Which magic method is called when an object is used like a function: $obj()?",opts:["__run()","__execute()","__call()","__invoke()"],correct:3,explain:"__invoke() makes an object callable. $obj('arg') will trigger __invoke('arg')."}
    ]
  },
  {
    id:9,title:"Exception Handling in OOP",level:"intermediate",desc:"try/catch, custom exceptions & hierarchy",icon:"⚡",
    content:{
      intro:`Exceptions are the OOP way to handle errors. PHP's <code>Exception</code> class can be extended to create domain-specific error hierarchies, making error handling precise and readable.`,
      sections:[
        {heading:"try / catch / finally",body:`Wrap risky code in try, catch specific exception types, and use finally for cleanup that always runs.`,
        code:`<span class="kw">function</span> <span class="fn">divide</span>(<span class="var">float</span> <span class="var">$a</span>, <span class="var">float</span> <span class="var">$b</span>): <span class="var">float</span> {
    <span class="kw">if</span> (<span class="var">$b</span> <span class="op">===</span> <span class="num">0.0</span>) <span class="kw">throw new</span> <span class="cls">DivisionByZeroError</span>(<span class="str">'Cannot divide by zero'</span>);
    <span class="kw">return</span> <span class="var">$a</span> <span class="op">/</span> <span class="var">$b</span>;
}

<span class="kw">try</span> {
    <span class="fn">echo</span> <span class="fn">divide</span>(<span class="num">10</span>, <span class="num">0</span>);
} <span class="kw">catch</span> (<span class="cls">DivisionByZeroError</span> <span class="var">$e</span>) {
    <span class="fn">echo</span> <span class="str">"Math error: "</span> <span class="op">.</span> <span class="var">$e</span><span class="op">-></span><span class="fn">getMessage</span>();
} <span class="kw">catch</span> (<span class="cls">Throwable</span> <span class="var">$e</span>) {
    <span class="fn">echo</span> <span class="str">"Unexpected: "</span> <span class="op">.</span> <span class="var">$e</span><span class="op">-></span><span class="fn">getMessage</span>();
} <span class="kw">finally</span> {
    <span class="fn">echo</span> <span class="str">"\nThis always runs."</span>; <span class="cm">// Cleanup, logging, etc.</span>
}`},
        {heading:"Custom Exception Hierarchy",body:`Extend Exception to create domain-specific exceptions. This lets you catch at different granularity levels.`,
        code:`<span class="cm">// Base domain exception</span>
<span class="kw">class</span> <span class="cls">AppException</span> <span class="kw">extends</span> <span class="cls">RuntimeException</span> {}

<span class="cm">// Specific exceptions</span>
<span class="kw">class</span> <span class="cls">ValidationException</span> <span class="kw">extends</span> <span class="cls">AppException</span> {
    <span class="kw">private</span> <span class="var">array</span> <span class="var">$errors</span>;
    <span class="kw">public function</span> <span class="fn">__construct</span>(<span class="var">array</span> <span class="var">$errors</span>) {
        <span class="var">$this</span><span class="op">-></span><span class="var">errors</span> <span class="op">=</span> <span class="var">$errors</span>;
        <span class="kw">parent</span>::<span class="fn">__construct</span>(<span class="str">'Validation failed'</span>, <span class="num">422</span>);
    }
    <span class="kw">public function</span> <span class="fn">getErrors</span>(): <span class="var">array</span> { <span class="kw">return</span> <span class="var">$this</span><span class="op">-></span><span class="var">errors</span>; }
}

<span class="kw">class</span> <span class="cls">NotFoundException</span> <span class="kw">extends</span> <span class="cls">AppException</span> {
    <span class="kw">public function</span> <span class="fn">__construct</span>(<span class="var">string</span> <span class="var">$resource</span>, <span class="var">int</span> <span class="var">$id</span>) {
        <span class="kw">parent</span>::<span class="fn">__construct</span>(<span class="str">"{$resource} #{$id} not found"</span>, <span class="num">404</span>);
    }
}

<span class="kw">function</span> <span class="fn">findUser</span>(<span class="var">int</span> <span class="var">$id</span>): <span class="var">array</span> {
    <span class="var">$user</span> <span class="op">=</span> <span class="fn">getUserFromDB</span>(<span class="var">$id</span>);
    <span class="kw">if</span> (<span class="op">!</span><span class="var">$user</span>) <span class="kw">throw new</span> <span class="cls">NotFoundException</span>(<span class="str">'User'</span>, <span class="var">$id</span>);
    <span class="kw">return</span> <span class="var">$user</span>;
}

<span class="kw">try</span> {
    <span class="var">$user</span> <span class="op">=</span> <span class="fn">findUser</span>(<span class="num">999</span>);
} <span class="kw">catch</span> (<span class="cls">NotFoundException</span> <span class="var">$e</span>) {
    <span class="fn">echo</span> <span class="var">$e</span><span class="op">-></span><span class="fn">getMessage</span>() <span class="op">.</span> <span class="str">" (HTTP "</span> <span class="op">.</span> <span class="var">$e</span><span class="op">-></span><span class="fn">getCode</span>() <span class="op">.</span> <span class="str">")"</span>;
    <span class="cm">// User #999 not found (HTTP 404)</span>
} <span class="kw">catch</span> (<span class="cls">AppException</span> <span class="var">$e</span>) {
    <span class="cm">// Catches any AppException or subclass</span>
}`}
      ],
      callout:{type:"warn",title:"CATCH SPECIFIC FIRST",text:"Always order catch blocks from most specific to most general. Catching 'Exception' or 'Throwable' first will swallow all errors before specific handlers can run."}
    },
    quiz:[
      {q:"Which block in try/catch always executes regardless of whether an exception was thrown?",opts:["catch","else","finally","always"],correct:2,explain:"The 'finally' block always runs — whether an exception was thrown and caught or not. Use it for guaranteed cleanup."},
      {q:"How do you create a custom exception in PHP?",opts:["Implement ExceptionInterface","Extend the Exception class","Use the exception() function","Declare with keyword 'exception'"],correct:1,explain:"Custom exceptions extend the built-in Exception class (or RuntimeException, LogicException, etc.): class MyException extends RuntimeException {}"},
      {q:"What does $e->getMessage() return?",opts:["The exception class name","The error code","The message passed to the exception constructor","The stack trace"],correct:2,explain:"getMessage() returns the string message passed as the first argument to the Exception constructor."}
    ]
  },
  {
    id:10,title:"Type System & Declarations",level:"intermediate",desc:"Typed PHP — union types, nullable & readonly",icon:"⬟",
    content:{
      intro:`PHP's type system has evolved dramatically. Modern PHP uses strict type declarations to catch errors early, improve IDE support, and make code self-documenting. <code>declare(strict_types=1)</code> enables strict mode.`,
      sections:[
        {heading:"Typed Properties & Parameters",body:`PHP 7.4+ supports typed class properties. PHP 8.0+ adds union types, mixed, and never. PHP 8.1 adds readonly.`,
        code:`<span class="kw">declare</span>(strict_types=<span class="num">1</span>);

<span class="kw">class</span> <span class="cls">Invoice</span> {
    <span class="cm">// PHP 8.1 readonly — set once, never mutated</span>
    <span class="kw">public readonly</span> <span class="var">string</span> <span class="var">$id</span>;

    <span class="cm">// Union type — string or int</span>
    <span class="kw">public</span> <span class="var">string</span><span class="op">|</span><span class="var">int</span> <span class="var">$reference</span>;

    <span class="cm">// Nullable — float or null</span>
    <span class="kw">public</span> <span class="var">?float</span> <span class="var">$discount</span> <span class="op">=</span> <span class="kw">null</span>;

    <span class="cm">// Array of typed items</span>
    <span class="kw">private</span> <span class="var">array</span> <span class="var">$items</span> <span class="op">=</span> [];

    <span class="kw">public function</span> <span class="fn">__construct</span>(<span class="var">string</span> <span class="var">$id</span>, <span class="var">string</span><span class="op">|</span><span class="var">int</span> <span class="var">$ref</span>) {
        <span class="var">$this</span><span class="op">-></span><span class="var">id</span>        <span class="op">=</span> <span class="var">$id</span>;   <span class="cm">// readonly — only assignable here</span>
        <span class="var">$this</span><span class="op">-></span><span class="var">reference</span> <span class="op">=</span> <span class="var">$ref</span>;
    }

    <span class="cm">// Return type: float, enforced at call site</span>
    <span class="kw">public function</span> <span class="fn">total</span>(): <span class="var">float</span> {
        <span class="var">$sum</span> <span class="op">=</span> <span class="fn">array_sum</span>(<span class="fn">array_column</span>(<span class="var">$this</span><span class="op">-></span><span class="var">items</span>, <span class="str">'price'</span>));
        <span class="kw">return</span> <span class="var">$this</span><span class="op">-></span><span class="var">discount</span> <span class="op">!==</span> <span class="kw">null</span>
            <span class="op">?</span> <span class="var">$sum</span> <span class="op">*</span> (<span class="num">1</span> <span class="op">-</span> <span class="var">$this</span><span class="op">-></span><span class="var">discount</span>)
            <span class="op">:</span> <span class="var">$sum</span>;
    }

    <span class="cm">// void — returns nothing</span>
    <span class="kw">public function</span> <span class="fn">addItem</span>(<span class="var">string</span> <span class="var">$name</span>, <span class="var">float</span> <span class="var">$price</span>): <span class="var">void</span> {
        <span class="var">$this</span><span class="op">-></span><span class="var">items</span>[] <span class="op">=</span> [<span class="str">'name'</span> <span class="op">=></span> <span class="var">$name</span>, <span class="str">'price'</span> <span class="op">=></span> <span class="var">$price</span>];
    }

    <span class="cm">// never — function always throws or exits</span>
    <span class="kw">public function</span> <span class="fn">fail</span>(<span class="var">string</span> <span class="var">$msg</span>): <span class="var">never</span> {
        <span class="kw">throw new</span> <span class="cls">RuntimeException</span>(<span class="var">$msg</span>);
    }
}

<span class="var">$inv</span> <span class="op">=</span> <span class="kw">new</span> <span class="cls">Invoice</span>(<span class="str">'INV-001'</span>, <span class="str">'REF-2024'</span>);
<span class="var">$inv</span><span class="op">-></span><span class="fn">addItem</span>(<span class="str">'PHP Book'</span>, <span class="num">49.99</span>);
<span class="var">$inv</span><span class="op">-></span><span class="var">discount</span> <span class="op">=</span> <span class="num">0.10</span>; <span class="cm">// 10% discount</span>
<span class="fn">echo</span> <span class="var">$inv</span><span class="op">-></span><span class="fn">total</span>(); <span class="cm">// 44.991</span>`}
      ],
      callout:{type:"tip",title:"ALWAYS USE STRICT TYPES",text:"Put declare(strict_types=1); at the top of every PHP file. It prevents silent type coercions (passing '5' where int is expected) and makes bugs surface immediately."}
    },
    quiz:[
      {q:"What does 'declare(strict_types=1)' do?",opts:["Makes all variables immutable","Disables type coercion — wrong types throw TypeError","Enables OOP features","Sets PHP to latest version"],correct:1,explain:"strict_types=1 disables PHP's implicit type coercion. Passing a string where int is expected throws a TypeError instead of silently converting."},
      {q:"What is a nullable type in PHP?",opts:["A type that can be any value","A type that accepts the declared type OR null","A type for optional parameters only","A type used only in interfaces"],correct:1,explain:"?string means the parameter/property can be a string OR null. It's shorthand for string|null."},
      {q:"What does 'readonly' do to a property (PHP 8.1+)?",opts:["Makes it private","Allows it only in static methods","Allows it to be set only once during initialization","Makes it a constant"],correct:2,explain:"readonly properties can only be assigned once — in the constructor or declaration. Any subsequent write throws an Error."}
    ]
  },
  {
    id:11,title:"Late Static Binding",level:"advanced",desc:"static:: vs self:: — dynamic class resolution",icon:"⟡",
    content:{
      intro:`<strong>Late Static Binding (LSB)</strong> allows referencing the <em>called</em> class at runtime, not the class where the method is defined. Use <code>static::</code> instead of <code>self::</code> to enable this.`,
      sections:[
        {heading:"self:: vs static::",body:`<code>self::</code> always refers to the class where the method was <em>defined</em>. <code>static::</code> refers to the class that was actually <em>called</em> — resolved at runtime.`,
        code:`<span class="kw">class</span> <span class="cls">Base</span> {
    <span class="kw">public static function</span> <span class="fn">create</span>(): <span class="var">static</span> {
        <span class="kw">return</span> <span class="kw">new</span> <span class="var">static</span>(); <span class="cm">// static:: — runtime class</span>
    }

    <span class="kw">public static function</span> <span class="fn">selfCreate</span>(): <span class="var">self</span> {
        <span class="kw">return</span> <span class="kw">new</span> <span class="var">self</span>(); <span class="cm">// self:: — always Base</span>
    }

    <span class="kw">public static function</span> <span class="fn">className</span>(): <span class="var">string</span> {
        <span class="kw">return</span> <span class="var">static</span>::<span class="kw">class</span>; <span class="cm">// Returns the called class name</span>
    }
}

<span class="kw">class</span> <span class="cls">Child</span> <span class="kw">extends</span> <span class="cls">Base</span> {}

<span class="var">$a</span> <span class="op">=</span> <span class="cls">Child</span>::<span class="fn">create</span>();     <span class="cm">// returns Child instance ✓</span>
<span class="var">$b</span> <span class="op">=</span> <span class="cls">Child</span>::<span class="fn">selfCreate</span>(); <span class="cm">// returns Base instance ✗</span>

<span class="fn">echo</span> <span class="fn">get_class</span>(<span class="var">$a</span>); <span class="cm">// Child</span>
<span class="fn">echo</span> <span class="fn">get_class</span>(<span class="var">$b</span>); <span class="cm">// Base</span>
<span class="fn">echo</span> <span class="cls">Child</span>::<span class="fn">className</span>(); <span class="cm">// Child</span>`,},
        {heading:"LSB in Active Record Pattern",body:`LSB is essential for frameworks like Eloquent where each model class shares static query methods from a base class.`,
        code:`<span class="kw">class</span> <span class="cls">Model</span> {
    <span class="kw">protected static</span> <span class="var">string</span> <span class="var">$table</span> <span class="op">=</span> <span class="str">'models'</span>;

    <span class="kw">public static function</span> <span class="fn">getTable</span>(): <span class="var">string</span> {
        <span class="kw">return</span> <span class="var">static</span>::<span class="var">$table</span>; <span class="cm">// LSB: uses child's $table</span>
    }

    <span class="kw">public static function</span> <span class="fn">find</span>(<span class="var">int</span> <span class="var">$id</span>): <span class="var">static</span> {
        <span class="fn">echo</span> <span class="str">"SELECT * FROM "</span> <span class="op">.</span> <span class="var">static</span>::<span class="var">$table</span> <span class="op">.</span> <span class="str">" WHERE id = {$id}"</span>;
        <span class="kw">return</span> <span class="kw">new</span> <span class="var">static</span>();
    }
}

<span class="kw">class</span> <span class="cls">User</span> <span class="kw">extends</span> <span class="cls">Model</span> {
    <span class="kw">protected static</span> <span class="var">string</span> <span class="var">$table</span> <span class="op">=</span> <span class="str">'users'</span>;
}

<span class="kw">class</span> <span class="cls">Post</span> <span class="kw">extends</span> <span class="cls">Model</span> {
    <span class="kw">protected static</span> <span class="var">string</span> <span class="var">$table</span> <span class="op">=</span> <span class="str">'posts'</span>;
}

<span class="cls">User</span>::<span class="fn">find</span>(<span class="num">1</span>); <span class="cm">// SELECT * FROM users WHERE id = 1</span>
<span class="cls">Post</span>::<span class="fn">find</span>(<span class="num">5</span>); <span class="cm">// SELECT * FROM posts WHERE id = 5</span>`}
      ],
      callout:{type:"info",title:"KEY INSIGHT",text:"Use static:: when you want child classes to inherit behavior that references their own class. Use self:: when you explicitly want to reference the class where the code lives, regardless of the caller."}
    },
    quiz:[
      {q:"What does 'static::' resolve to at runtime?",opts:["Always the class where the method is defined","The class that was actually called (the runtime class)","The parent class","The first class in the hierarchy"],correct:1,explain:"static:: is resolved at runtime to whichever class was actually called — this is what 'late' means in Late Static Binding."},
      {q:"In contrast, what does 'self::' always refer to?",opts:["The runtime called class","The class where the method was originally defined","The root parent class","A new anonymous class"],correct:1,explain:"self:: is resolved at compile time to the class where the method is physically written, regardless of which child class calls it."},
      {q:"Which return type hint promises the method returns an instance of the called class?",opts:["self","parent","static","mixed"],correct:2,explain:"The 'static' return type means 'an instance of the class that was called' — useful in fluent interfaces and factory methods."}
    ]
  },
  {
    id:12,title:"Namespaces & Autoloading",level:"advanced",desc:"Organizing code & PSR-4 with Composer",icon:"⬡",
    content:{
      intro:`<strong>Namespaces</strong> prevent class name collisions across large projects and packages. <strong>PSR-4 autoloading</strong> via Composer eliminates manual <code>require</code> statements entirely.`,
      sections:[
        {heading:"Namespaces",body:`Declared at the top of each file. Use backslash as separator. Import with <code>use</code>.`,
        code:`<span class="cm">// File: src/Database/Connection.php</span>
<span class="kw">namespace</span> App\Database;

<span class="kw">class</span> <span class="cls">Connection</span> {
    <span class="kw">private static</span> <span class="var">?\PDO</span> <span class="var">$pdo</span> <span class="op">=</span> <span class="kw">null</span>;
    <span class="kw">public static function</span> <span class="fn">get</span>(<span class="var">string</span> <span class="var">$dsn</span>): \<span class="cls">PDO</span> {
        <span class="kw">return</span> <span class="var">self</span>::<span class="var">$pdo</span> <span class="op">??=</span> <span class="kw">new</span> \<span class="cls">PDO</span>(<span class="var">$dsn</span>);
    }
}

<span class="cm">// File: src/Models/User.php</span>
<span class="kw">namespace</span> App\Models;

<span class="kw">use</span> App\Database\<span class="cls">Connection</span>;       <span class="cm">// Import</span>
<span class="kw">use</span> App\Traits\<span class="cls">Timestampable</span>;
<span class="kw">use</span> <span class="cls">InvalidArgumentException</span>;       <span class="cm">// Global namespace</span>

<span class="kw">class</span> <span class="cls">User</span> {
    <span class="kw">use</span> <span class="cls">Timestampable</span>;
    <span class="kw">public function</span> <span class="fn">find</span>(<span class="var">int</span> <span class="var">$id</span>): <span class="var">?array</span> {
        <span class="var">$pdo</span> <span class="op">=</span> <span class="cls">Connection</span>::<span class="fn">get</span>(<span class="var">$_ENV</span>[<span class="str">'DB_DSN'</span>]);
        <span class="var">$stmt</span> <span class="op">=</span> <span class="var">$pdo</span><span class="op">-></span><span class="fn">prepare</span>(<span class="str">'SELECT * FROM users WHERE id=?'</span>);
        <span class="var">$stmt</span><span class="op">-></span><span class="fn">execute</span>([<span class="var">$id</span>]);
        <span class="kw">return</span> <span class="var">$stmt</span><span class="op">-></span><span class="fn">fetch</span>(\<span class="cls">PDO</span>::FETCH_ASSOC) <span class="op">?:</span> <span class="kw">null</span>;
    }
}`,},
        {heading:"PSR-4 & Composer Autoloading",body:`Map namespace prefixes to directories in composer.json. Run composer dump-autoload once, then classes load automatically.`,
        code:`<span class="cm">// composer.json</span>
{
    <span class="str">"autoload"</span>: {
        <span class="str">"psr-4"</span>: {
            <span class="str">"App\\"</span>: <span class="str">"src/"</span>
        }
    }
}
<span class="cm">// Run: composer dump-autoload</span>

<span class="cm">// Namespace → File path mapping:</span>
<span class="cm">// App\Models\User      → src/Models/User.php</span>
<span class="cm">// App\Database\Conn    → src/Database/Conn.php</span>
<span class="cm">// App\Http\Controller  → src/Http/Controller.php</span>

<span class="cm">// index.php — that's all you need!</span>
<span class="kw">require</span> <span class="str">'vendor/autoload.php'</span>;

<span class="kw">use</span> App\Models\<span class="cls">User</span>;
<span class="var">$user</span> <span class="op">=</span> <span class="kw">new</span> <span class="cls">User</span>(); <span class="cm">// Autoloaded — no require needed</span>`}
      ],
      callout:{type:"tip",title:"INDUSTRY STANDARD",text:"Every professional PHP project uses Composer + PSR-4 autoloading. Laravel, Symfony, and all modern frameworks depend on it. Never manually require/include class files."}
    },
    quiz:[
      {q:"What is the purpose of PHP namespaces?",opts:["Faster execution","Prevent name collisions and organize code","Enable multiple inheritance","Create global variables"],correct:1,explain:"Namespaces prevent class name conflicts and organize large codebases — two packages can both have a 'User' class in different namespaces."},
      {q:"Which PSR standard defines PHP autoloading?",opts:["PSR-1","PSR-2","PSR-4","PSR-12"],correct:2,explain:"PSR-4 autoloading maps namespace prefixes to filesystem directories. It's what Composer implements."},
      {q:"Which Composer command regenerates the autoload files after changes?",opts:["composer update","composer install","composer dump-autoload","composer refresh"],correct:2,explain:"'composer dump-autoload' regenerates vendor/autoload.php after you change namespace mappings in composer.json."}
    ]
  },
  {
    id:13,title:"SOLID Principles",level:"advanced",desc:"The five pillars of maintainable OOP design",icon:"◈",
    content:{
      intro:`<strong>SOLID</strong> is an acronym for five OOP design principles that produce maintainable, flexible, and testable code. They are the theoretical foundation behind every major PHP framework's architecture.`,
      sections:[
        {heading:"S — Single Responsibility Principle",body:`A class should have one, and only one, reason to change. Split classes that do too many things.`,
        code:`<span class="cm">// BAD — UserManager does too much</span>
<span class="kw">class</span> <span class="cls">UserManager</span> {
    <span class="kw">public function</span> <span class="fn">createUser</span>(<span class="var">array</span> <span class="var">$data</span>) { <span class="cm">/* ... */</span> }
    <span class="kw">public function</span> <span class="fn">sendWelcomeEmail</span>(<span class="var">$user</span>) { <span class="cm">/* ... */</span> }
    <span class="kw">public function</span> <span class="fn">generateReport</span>() { <span class="cm">/* ... */</span> }
    <span class="kw">public function</span> <span class="fn">logActivity</span>(<span class="var">string</span> <span class="var">$msg</span>) { <span class="cm">/* ... */</span> }
}

<span class="cm">// GOOD — each class has one job</span>
<span class="kw">class</span> <span class="cls">UserRepository</span>  { <span class="kw">public function</span> <span class="fn">save</span>(<span class="var">array</span> <span class="var">$data</span>) {<span class="cm">/*...*/</span>} }
<span class="kw">class</span> <span class="cls">UserMailer</span>     { <span class="kw">public function</span> <span class="fn">sendWelcome</span>(<span class="var">$user</span>) {<span class="cm">/*...*/</span>} }
<span class="kw">class</span> <span class="cls">ReportService</span>  { <span class="kw">public function</span> <span class="fn">generate</span>() {<span class="cm">/*...*/</span>} }
<span class="kw">class</span> <span class="cls">Logger</span>         { <span class="kw">public function</span> <span class="fn">log</span>(<span class="var">string</span> <span class="var">$msg</span>) {<span class="cm">/*...*/</span>} }`},
        {heading:"O/L/I/D — Open, Liskov, Interface, Dependency",body:`The remaining four principles complete the framework for clean OOP design.`,
        bullets:[
          "<strong>Open/Closed</strong> — Open for extension, closed for modification. Add features by adding classes, not editing existing ones.",
          "<strong>Liskov Substitution</strong> — Child classes must be substitutable for parent classes without breaking behavior.",
          "<strong>Interface Segregation</strong> — Many small, specific interfaces are better than one fat interface.",
          "<strong>Dependency Inversion</strong> — Depend on abstractions (interfaces), not concrete implementations."
        ],
        code:`<span class="cm">// D — Dependency Inversion Principle</span>
<span class="kw">interface</span> <span class="cls">NotifierInterface</span> {
    <span class="kw">public function</span> <span class="fn">send</span>(<span class="var">string</span> <span class="var">$message</span>): <span class="var">void</span>;
}

<span class="kw">class</span> <span class="cls">EmailNotifier</span> <span class="kw">implements</span> <span class="cls">NotifierInterface</span> {
    <span class="kw">public function</span> <span class="fn">send</span>(<span class="var">string</span> <span class="var">$msg</span>): <span class="var">void</span> { <span class="fn">mail</span>(<span class="str">'user@example.com'</span>, <span class="str">'Note'</span>, <span class="var">$msg</span>); }
}

<span class="kw">class</span> <span class="cls">SlackNotifier</span> <span class="kw">implements</span> <span class="cls">NotifierInterface</span> {
    <span class="kw">public function</span> <span class="fn">send</span>(<span class="var">string</span> <span class="var">$msg</span>): <span class="var">void</span> { <span class="cm">/* POST to Slack API */</span> }
}

<span class="cm">// Depends on interface, not concrete class</span>
<span class="kw">class</span> <span class="cls">OrderService</span> {
    <span class="kw">public function</span> <span class="fn">__construct</span>(<span class="kw">private</span> <span class="cls">NotifierInterface</span> <span class="var">$notifier</span>) {}

    <span class="kw">public function</span> <span class="fn">placeOrder</span>(<span class="var">array</span> <span class="var">$order</span>): <span class="var">void</span> {
        <span class="cm">// process order...</span>
        <span class="var">$this</span><span class="op">-></span><span class="var">notifier</span><span class="op">-></span><span class="fn">send</span>(<span class="str">"Order #{$order['id']} placed!"</span>);
    }
}

<span class="cm">// Swap notifiers without touching OrderService</span>
<span class="var">$svc</span> <span class="op">=</span> <span class="kw">new</span> <span class="cls">OrderService</span>(<span class="kw">new</span> <span class="cls">SlackNotifier</span>());
<span class="var">$svc</span><span class="op">-></span><span class="fn">placeOrder</span>([<span class="str">'id'</span> <span class="op">=></span> <span class="num">42</span>]);</span>`}
      ],
      callout:{type:"info",title:"SOLID IN THE WILD",text:"Laravel's Service Container, Symfony's Dependency Injection, and virtually every design pattern implement SOLID principles. Understanding them explains why frameworks are built the way they are."}
    },
    quiz:[
      {q:"What does the 'S' in SOLID stand for?",opts:["Static Responsibility","Single Responsibility Principle","Substitution Rule","Strict Operations"],correct:1,explain:"S = Single Responsibility Principle: a class should have one, and only one, reason to change."},
      {q:"The Dependency Inversion Principle states that you should depend on:",opts:["Concrete implementations","Static methods","Abstractions (interfaces/abstract classes)","Global functions"],correct:2,explain:"DIP: high-level modules should not depend on low-level modules. Both should depend on abstractions (interfaces)."},
      {q:"Which SOLID principle says a class should be open for extension but closed for modification?",opts:["Single Responsibility","Open/Closed Principle","Liskov Substitution","Interface Segregation"],correct:1,explain:"Open/Closed Principle: add new functionality by creating new classes/methods, not by modifying existing working code."}
    ]
  },
  {
    id:14,title:"Dependency Injection",level:"advanced",desc:"DI containers, constructor injection & IoC",icon:"⇄",
    content:{
      intro:`<strong>Dependency Injection (DI)</strong> means providing an object's dependencies from outside rather than creating them internally. This decouples classes, enables testing with mocks, and is the core mechanism behind Laravel's service container.`,
      sections:[
        {heading:"Constructor Injection",body:`The cleanest form of DI — pass dependencies through the constructor. They're explicit, testable, and required.`,
        code:`<span class="cm">// WITHOUT DI — tightly coupled, hard to test</span>
<span class="kw">class</span> <span class="cls">OrderController</span> {
    <span class="kw">private</span> <span class="var">$db</span>;
    <span class="kw">public function</span> <span class="fn">__construct</span>() {
        <span class="var">$this</span><span class="op">-></span><span class="var">db</span> <span class="op">=</span> <span class="kw">new</span> <span class="cls">MySQLDatabase</span>(); <span class="cm">// Hard dependency!</span>
    }
}

<span class="cm">// WITH DI — loose coupling, fully testable</span>
<span class="kw">interface</span> <span class="cls">DatabaseInterface</span> {
    <span class="kw">public function</span> <span class="fn">query</span>(<span class="var">string</span> <span class="var">$sql</span>, <span class="var">array</span> <span class="var">$params</span>): <span class="var">array</span>;
}

<span class="kw">class</span> <span class="cls">MySQLDatabase</span> <span class="kw">implements</span> <span class="cls">DatabaseInterface</span> {
    <span class="kw">public function</span> <span class="fn">query</span>(<span class="var">string</span> <span class="var">$sql</span>, <span class="var">array</span> <span class="var">$params</span>): <span class="var">array</span> {
        <span class="cm">// Real DB implementation</span>
        <span class="kw">return</span> [];
    }
}

<span class="kw">class</span> <span class="cls">InMemoryDatabase</span> <span class="kw">implements</span> <span class="cls">DatabaseInterface</span> {
    <span class="kw">private</span> <span class="var">array</span> <span class="var">$store</span> <span class="op">=</span> [];
    <span class="kw">public function</span> <span class="fn">query</span>(<span class="var">string</span> <span class="var">$sql</span>, <span class="var">array</span> <span class="var">$params</span>): <span class="var">array</span> {
        <span class="kw">return</span> <span class="var">$this</span><span class="op">-></span><span class="var">store</span>; <span class="cm">// For tests</span>
    }
}

<span class="kw">class</span> <span class="cls">OrderService</span> {
    <span class="kw">public function</span> <span class="fn">__construct</span>(
        <span class="kw">private</span> <span class="cls">DatabaseInterface</span>  <span class="var">$db</span>,
        <span class="kw">private</span> <span class="cls">NotifierInterface</span>  <span class="var">$notifier</span>,
        <span class="kw">private</span> <span class="cls">LoggerInterface</span>    <span class="var">$logger</span>
    ) {}

    <span class="kw">public function</span> <span class="fn">placeOrder</span>(<span class="var">array</span> <span class="var">$data</span>): <span class="var">void</span> {
        <span class="var">$this</span><span class="op">-></span><span class="var">db</span><span class="op">-></span><span class="fn">query</span>(<span class="str">'INSERT INTO orders...'</span>, <span class="var">$data</span>);
        <span class="var">$this</span><span class="op">-></span><span class="var">notifier</span><span class="op">-></span><span class="fn">send</span>(<span class="str">'Order placed!'</span>);
        <span class="var">$this</span><span class="op">-></span><span class="var">logger</span><span class="op">-></span><span class="fn">info</span>(<span class="str">'Order created'</span>);
    }
}`,},
        {heading:"Simple DI Container",body:`A DI Container automates dependency wiring. It resolves class dependencies recursively using PHP's Reflection API.`,
        code:`<span class="kw">class</span> <span class="cls">Container</span> {
    <span class="kw">private</span> <span class="var">array</span> <span class="var">$bindings</span> <span class="op">=</span> [];

    <span class="cm">// Bind interface to concrete implementation</span>
    <span class="kw">public function</span> <span class="fn">bind</span>(<span class="var">string</span> <span class="var">$abstract</span>, <span class="var">string</span> <span class="var">$concrete</span>): <span class="var">void</span> {
        <span class="var">$this</span><span class="op">-></span><span class="var">bindings</span>[<span class="var">$abstract</span>] <span class="op">=</span> <span class="var">$concrete</span>;
    }

    <span class="cm">// Auto-resolve class with all its dependencies</span>
    <span class="kw">public function</span> <span class="fn">make</span>(<span class="var">string</span> <span class="var">$class</span>): <span class="var">object</span> {
        <span class="var">$concrete</span> <span class="op">=</span> <span class="var">$this</span><span class="op">-></span><span class="var">bindings</span>[<span class="var">$class</span>] <span class="op">??</span> <span class="var">$class</span>;
        <span class="var">$ref</span> <span class="op">=</span> <span class="kw">new</span> <span class="cls">ReflectionClass</span>(<span class="var">$concrete</span>);
        <span class="var">$constructor</span> <span class="op">=</span> <span class="var">$ref</span><span class="op">-></span><span class="fn">getConstructor</span>();

        <span class="kw">if</span> (<span class="op">!</span><span class="var">$constructor</span>) <span class="kw">return</span> <span class="kw">new</span> <span class="var">$concrete</span>;

        <span class="var">$deps</span> <span class="op">=</span> <span class="fn">array_map</span>(
            <span class="kw">fn</span>(<span class="var">$p</span>) <span class="op">=></span> <span class="var">$this</span><span class="op">-></span><span class="fn">make</span>(<span class="var">$p</span><span class="op">-></span><span class="fn">getType</span>()<span class="op">-></span><span class="fn">getName</span>()),
            <span class="var">$constructor</span><span class="op">-></span><span class="fn">getParameters</span>()
        );

        <span class="kw">return</span> <span class="var">$ref</span><span class="op">-></span><span class="fn">newInstanceArgs</span>(<span class="var">$deps</span>);
    }
}

<span class="var">$container</span> <span class="op">=</span> <span class="kw">new</span> <span class="cls">Container</span>();
<span class="var">$container</span><span class="op">-></span><span class="fn">bind</span>(<span class="cls">DatabaseInterface</span>::<span class="kw">class</span>, <span class="cls">MySQLDatabase</span>::<span class="kw">class</span>);
<span class="var">$container</span><span class="op">-></span><span class="fn">bind</span>(<span class="cls">NotifierInterface</span>::<span class="kw">class</span>, <span class="cls">SlackNotifier</span>::<span class="kw">class</span>);

<span class="cm">// Container auto-wires all dependencies!</span>
<span class="var">$service</span> <span class="op">=</span> <span class="var">$container</span><span class="op">-></span><span class="fn">make</span>(<span class="cls">OrderService</span>::<span class="kw">class</span>);</span>`}
      ],
      callout:{type:"tip",title:"DI IN LARAVEL",text:"Laravel's service container is a sophisticated DI container. When you type-hint a class in a controller constructor, Laravel automatically resolves and injects all dependencies — powered by the exact Reflection technique shown above."}
    },
    quiz:[
      {q:"What is the core idea behind Dependency Injection?",opts:["Creating dependencies inside the class","Providing dependencies from outside the class","Using static methods for all dependencies","Avoiding the use of interfaces"],correct:1,explain:"DI means a class receives its dependencies rather than creating them. This decouples the class from specific implementations."},
      {q:"Which type of injection is considered the cleanest and most recommended?",opts:["Property injection","Setter injection","Constructor injection","Static injection"],correct:2,explain:"Constructor injection makes dependencies explicit, required, and visible. The object cannot be created in an invalid state."},
      {q:"What PHP feature does a DI container use to auto-resolve dependencies?",opts:["Output buffering","The Reflection API","Magic methods","Static properties"],correct:1,explain:"A DI container uses PHP's ReflectionClass to inspect constructor parameters and automatically resolve their types, then recursively build the entire dependency graph."}
    ]
  },
  {
    id:15,title:"Design Patterns",level:"advanced",desc:"Singleton, Strategy, Observer & Repository",icon:"⬢",
    content:{
      intro:`<strong>Design patterns</strong> are proven, reusable architectural solutions. They are templates — not code — documenting the best way to solve recurring OOP design problems. Every Laravel/Symfony developer uses these daily.`,
      sections:[
        {heading:"Singleton & Strategy Patterns",body:`Singleton ensures one instance. Strategy makes algorithms swappable at runtime.`,
        code:`<span class="cm">// SINGLETON — one instance globally</span>
<span class="kw">final class</span> <span class="cls">Config</span> {
    <span class="kw">private static</span> <span class="var">?self</span> <span class="var">$instance</span> <span class="op">=</span> <span class="kw">null</span>;
    <span class="kw">private</span> <span class="var">array</span> <span class="var">$data</span> <span class="op">=</span> [];

    <span class="kw">private function</span> <span class="fn">__construct</span>() {}
    <span class="kw">private function</span> <span class="fn">__clone</span>() {}

    <span class="kw">public static function</span> <span class="fn">getInstance</span>(): <span class="var">static</span> {
        <span class="kw">return</span> <span class="var">static</span>::<span class="var">$instance</span> <span class="op">??=</span> <span class="kw">new</span> <span class="var">static</span>();
    }
    <span class="kw">public function</span> <span class="fn">set</span>(<span class="var">string</span> <span class="var">$k</span>, <span class="kw">mixed</span> <span class="var">$v</span>): <span class="var">void</span>  { <span class="var">$this</span><span class="op">-></span><span class="var">data</span>[<span class="var">$k</span>] <span class="op">=</span> <span class="var">$v</span>; }
    <span class="kw">public function</span> <span class="fn">get</span>(<span class="var">string</span> <span class="var">$k</span>): <span class="kw">mixed</span>           { <span class="kw">return</span> <span class="var">$this</span><span class="op">-></span><span class="var">data</span>[<span class="var">$k</span>] <span class="op">??</span> <span class="kw">null</span>; }
}

<span class="cm">// STRATEGY — swappable algorithms</span>
<span class="kw">interface</span> <span class="cls">SortStrategy</span> {
    <span class="kw">public function</span> <span class="fn">sort</span>(<span class="var">array</span> <span class="var">$data</span>): <span class="var">array</span>;
}

<span class="kw">class</span> <span class="cls">BubbleSort</span> <span class="kw">implements</span> <span class="cls">SortStrategy</span> {
    <span class="kw">public function</span> <span class="fn">sort</span>(<span class="var">array</span> <span class="var">$d</span>): <span class="var">array</span> { <span class="fn">sort</span>(<span class="var">$d</span>); <span class="kw">return</span> <span class="var">$d</span>; }
}
<span class="kw">class</span> <span class="cls">QuickSort</span> <span class="kw">implements</span> <span class="cls">SortStrategy</span> {
    <span class="kw">public function</span> <span class="fn">sort</span>(<span class="var">array</span> <span class="var">$d</span>): <span class="var">array</span> { <span class="fn">usort</span>(<span class="var">$d</span>, <span class="kw">fn</span>(<span class="var">$a</span>,<span class="var">$b</span>) <span class="op">=></span> <span class="var">$a</span> <span class="op"><=>  </span><span class="var">$b</span>); <span class="kw">return</span> <span class="var">$d</span>; }
}

<span class="kw">class</span> <span class="cls">DataProcessor</span> {
    <span class="kw">public function</span> <span class="fn">__construct</span>(<span class="kw">private</span> <span class="cls">SortStrategy</span> <span class="var">$sorter</span>) {}
    <span class="kw">public function</span> <span class="fn">process</span>(<span class="var">array</span> <span class="var">$d</span>): <span class="var">array</span> { <span class="kw">return</span> <span class="var">$this</span><span class="op">-></span><span class="var">sorter</span><span class="op">-></span><span class="fn">sort</span>(<span class="var">$d</span>); }
}

<span class="var">$proc</span> <span class="op">=</span> <span class="kw">new</span> <span class="cls">DataProcessor</span>(<span class="kw">new</span> <span class="cls">QuickSort</span>());
<span class="fn">print_r</span>(<span class="var">$proc</span><span class="op">-></span><span class="fn">process</span>([<span class="num">3</span>,<span class="num">1</span>,<span class="num">4</span>,<span class="num">1</span>,<span class="num">5</span>])); <span class="cm">// [1,1,3,4,5]</span>`},
        {heading:"Observer Pattern",body:`Defines a one-to-many dependency. When one object changes state, all dependents are notified automatically. Foundation of Laravel Events.`,
        code:`<span class="kw">interface</span> <span class="cls">Observer</span> {
    <span class="kw">public function</span> <span class="fn">update</span>(<span class="var">string</span> <span class="var">$event</span>, <span class="kw">mixed</span> <span class="var">$data</span>): <span class="var">void</span>;
}

<span class="kw">trait</span> <span class="cls">Observable</span> {
    <span class="kw">private</span> <span class="var">array</span> <span class="var">$observers</span> <span class="op">=</span> [];

    <span class="kw">public function</span> <span class="fn">subscribe</span>(<span class="cls">Observer</span> <span class="var">$o</span>): <span class="var">void</span> { <span class="var">$this</span><span class="op">-></span><span class="var">observers</span>[] <span class="op">=</span> <span class="var">$o</span>; }

    <span class="kw">protected function</span> <span class="fn">emit</span>(<span class="var">string</span> <span class="var">$event</span>, <span class="kw">mixed</span> <span class="var">$data</span> <span class="op">=</span> <span class="kw">null</span>): <span class="var">void</span> {
        <span class="kw">foreach</span> (<span class="var">$this</span><span class="op">-></span><span class="var">observers</span> <span class="kw">as</span> <span class="var">$o</span>) <span class="var">$o</span><span class="op">-></span><span class="fn">update</span>(<span class="var">$event</span>, <span class="var">$data</span>);
    }
}

<span class="kw">class</span> <span class="cls">UserService</span> {
    <span class="kw">use</span> <span class="cls">Observable</span>;
    <span class="kw">public function</span> <span class="fn">register</span>(<span class="var">string</span> <span class="var">$email</span>): <span class="var">void</span> {
        <span class="cm">// ... save to DB ...</span>
        <span class="var">$this</span><span class="op">-></span><span class="fn">emit</span>(<span class="str">'user.registered'</span>, [<span class="str">'email'</span> <span class="op">=></span> <span class="var">$email</span>]);
    }
}

<span class="kw">class</span> <span class="cls">WelcomeEmailListener</span> <span class="kw">implements</span> <span class="cls">Observer</span> {
    <span class="kw">public function</span> <span class="fn">update</span>(<span class="var">string</span> <span class="var">$event</span>, <span class="kw">mixed</span> <span class="var">$data</span>): <span class="var">void</span> {
        <span class="kw">if</span> (<span class="var">$event</span> <span class="op">===</span> <span class="str">'user.registered'</span>)
            <span class="fn">echo</span> <span class="str">"Sending welcome to {$data['email']}\n"</span>;
    }
}

<span class="var">$svc</span> <span class="op">=</span> <span class="kw">new</span> <span class="cls">UserService</span>();
<span class="var">$svc</span><span class="op">-></span><span class="fn">subscribe</span>(<span class="kw">new</span> <span class="cls">WelcomeEmailListener</span>());
<span class="var">$svc</span><span class="op">-></span><span class="fn">register</span>(<span class="str">'alice@dev.io'</span>); <span class="cm">// Sending welcome to alice@dev.io</span>`}
      ],
      callout:{type:"info",title:"THE GANG OF FOUR",text:"23 patterns from 'Design Patterns: Reusable OO Software'. Essential PHP ones: Singleton, Factory, Builder, Observer, Decorator, Strategy, Repository, Dependency Injection, Command, Adapter."}
    },
    quiz:[
      {q:"The Singleton pattern ensures:",opts:["Objects can be copied freely","Only one instance of a class exists","All methods are static","The class cannot be extended"],correct:1,explain:"Singleton restricts instantiation to a single object and provides a global access point to it."},
      {q:"The Observer pattern implements what kind of relationship?",opts:["One-to-one","Many-to-many","One-to-many notification","Parent-child inheritance"],correct:2,explain:"Observer: one subject notifies many observers when its state changes. It's the basis for event systems everywhere."},
      {q:"The Strategy pattern is best used when:",opts:["You need a single database instance","You want to swap algorithms at runtime without changing the calling code","You need to add properties dynamically","You want to prevent class extension"],correct:1,explain:"Strategy encapsulates interchangeable algorithms behind a common interface so the client code doesn't need to change when the algorithm does."}
    ]
  }
];

// ── STATE ──
let currentChapter = null;
let quizState = { qi: 0, answered: false, score: 0, finished: false };
let completed = new Set(JSON.parse(localStorage.getItem('oop_done') || '[]'));
let selectedOpt = null;

function save() { localStorage.setItem('oop_done', JSON.stringify([...completed])); }

function getLevelBadge(l) {
  const m={beginner:'badge-beginner',intermediate:'badge-intermediate',advanced:'badge-advanced'};
  return `<span class="nav-badge ${m[l]}">${l.toUpperCase()}</span>`;
}

function getLevelPill(l) {
  const bg={beginner:'rgba(0,255,136,0.15)',intermediate:'rgba(0,212,255,0.15)',advanced:'rgba(255,107,53,0.15)'};
  const cl={beginner:'var(--accent3)',intermediate:'var(--accent)',advanced:'var(--accent4)'};
  return `<span class="meta-pill" style="background:${bg[l]};color:${cl[l]}">${l.toUpperCase()}</span>`;
}

function buildNav() {
  const levels = ['beginner','intermediate','advanced'];
  const labels = {beginner:'01 — BEGINNER',intermediate:'02 — INTERMEDIATE',advanced:'03 — ADVANCED'};
  let html = '';
  levels.forEach(lv => {
    const chs = chapters.filter(c => c.level === lv);
    html += `<div class="nav-section"><div class="nav-section-label">${labels[lv]}</div>`;
    chs.forEach(ch => {
      const done = completed.has(ch.id);
      html += `<div class="nav-item${currentChapter?.id===ch.id?' active':''}" onclick="openChapter(${ch.id})">
        <span class="nav-num">${String(ch.id+1).padStart(2,'0')}</span>
        <div class="nav-info"><div class="nav-title">${ch.title}</div></div>
        ${getLevelBadge(ch.level)}
        <div class="nav-check${done?' done':''}">${done?'✓':''}</div>
      </div>`;
    });
    html += '</div>';
  });
  document.getElementById('navList').innerHTML = html;
  const pct = Math.round(completed.size / chapters.length * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${completed.size} / ${chapters.length}`;
}

function copyCode(btn) {
  navigator.clipboard.writeText(btn.closest('.code-wrap').querySelector('pre').innerText)
    .then(() => { btn.textContent='COPIED!'; setTimeout(()=>btn.textContent='COPY',2000); });
}

// ── HOME ──
function showHome() {
  currentChapter = null;
  document.getElementById('crumb').innerHTML = `PHP::OOP &nbsp;/&nbsp; <span>Home</span>`;
  document.getElementById('prevBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';

  const grid = chapters.map(ch => {
    const done = completed.has(ch.id);
    return `<div class="chapter-card${done?' completed':''}" onclick="openChapter(${ch.id})">
      <div class="card-num">${String(ch.id+1).padStart(2,'0')} / ${chapters.length}</div>
      <div class="card-title">${ch.icon} ${ch.title}</div>
      <div class="card-desc">${ch.desc}</div>
      <div class="card-footer">${getLevelBadge(ch.level)}<span style="font-family:var(--font-mono);font-size:10px;color:${done?'var(--accent3)':'var(--text3)'}">${done?'✓ DONE':'→ START'}</span></div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
  <div class="hero">
    <div class="hero-tag">PHP MASTERY COURSE</div>
    <h1>Master <span class="highlight">Object<br>Oriented</span> PHP</h1>
    <p>From beginner concepts to advanced design patterns. ${chapters.length} chapters with real-world examples, syntax-highlighted code, and chapter quizzes.</p>
    <div class="hero-stats">
      <div class="stat"><div class="stat-num">${chapters.length}</div><div class="stat-label">CHAPTERS</div></div>
      <div class="stat"><div class="stat-num">${chapters.reduce((a,c)=>a+c.quiz.length,0)}</div><div class="stat-label">QUIZ QUESTIONS</div></div>
      <div class="stat"><div class="stat-num">${completed.size}</div><div class="stat-label">COMPLETED</div></div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="chapters-grid">${grid}</div>`;
  buildNav(); closeSidebar();
}

// ── CHAPTER ──
function openChapter(id) {
  currentChapter = chapters[id];
  quizState = { qi:0, answered:false, score:0, finished:false };
  document.getElementById('crumb').innerHTML = `PHP::OOP &nbsp;/&nbsp; <span>${currentChapter.title}</span>`;
  document.getElementById('prevBtn').style.display = id > 0 ? 'block' : 'none';
  document.getElementById('nextBtn').style.display = id < chapters.length-1 ? 'block' : 'none';
  renderChapter(); buildNav(); closeSidebar(); window.scrollTo(0,0);
}

function navigate(dir) {
  if (!currentChapter) return;
  const n = currentChapter.id + dir;
  if (n >= 0 && n < chapters.length) openChapter(n);
}

function renderChapter() {
  const ch = currentChapter, c = ch.content;
  let shtml = '';
  c.sections.forEach(s => {
    let bl = s.bullets ? `<ul>${s.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>` : '';
    let cd = s.code ? `<div class="code-wrap"><div class="code-header"><span class="code-lang">PHP</span><button class="code-copy" onclick="copyCode(this)">COPY</button></div><div class="code-body"><pre>${s.code}</pre></div></div>` : '';
    shtml += `<div class="content-section"><h3>${s.heading}</h3><p>${s.body}</p>${bl}${cd}</div>`;
  });
  const callout = c.callout ? `<div class="callout callout-${c.callout.type}"><strong>${c.callout.title}</strong>${c.callout.text}</div>` : '';

  document.getElementById('content').innerHTML = `
  <div class="chapter-view">
    <div class="chapter-header">
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text3);letter-spacing:2px;margin-bottom:8px">CHAPTER ${String(ch.id+1).padStart(2,'0')} OF ${chapters.length}</div>
      <h2>${ch.icon} ${ch.title}</h2>
      <p style="font-size:14px;color:var(--text2);margin-top:8px;line-height:1.7">${c.intro}</p>
      <div class="chapter-meta">
        ${getLevelPill(ch.level)}
        <span class="meta-pill" style="background:rgba(0,212,255,0.1);color:var(--accent)">${ch.quiz.length} QUESTIONS</span>
        ${completed.has(ch.id)?'<span class="meta-pill" style="background:rgba(0,255,136,0.1);color:var(--accent3)">✓ COMPLETED</span>':''}
      </div>
    </div>
    ${shtml}${callout}
    <div id="quizSection"></div>
    <div class="nav-btns">
      ${ch.id>0?`<button class="btn btn-ghost" onclick="navigate(-1)">← PREV CHAPTER</button>`:''}
      ${ch.id<chapters.length-1?`<button class="btn btn-primary" onclick="navigate(1)">NEXT CHAPTER →</button>`:`<button class="btn btn-success" onclick="showHome()">↩ ALL CHAPTERS</button>`}
    </div>
  </div>`;
  renderQuiz();
}

// ── QUIZ ──
function renderQuiz() {
  const qs = currentChapter.quiz, qz = quizState;
  if (qz.finished) { renderResult(); return; }
  const q = qs[qz.qi], L = ['A','B','C','D'];
  document.getElementById('quizSection').innerHTML = `
  <div class="quiz-section">
    <div class="quiz-header">
      <div class="quiz-title">⬡ CHAPTER QUIZ</div>
      <div class="quiz-progress-text">QUESTION ${qz.qi+1} / ${qs.length}</div>
    </div>
    <div class="question-block">
      <div class="question-num">Q${qz.qi+1}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">${q.opts.map((o,i)=>`<div class="option" id="opt-${i}" onclick="selectOpt(${i})"><span class="option-letter">${L[i]}.</span><span class="option-text">${o}</span></div>`).join('')}</div>
      <div class="feedback" id="feedback"></div>
      <div class="quiz-actions">
        <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()" style="display:none">CHECK ANSWER</button>
        <button class="btn btn-ghost" id="nextQBtn" onclick="nextQ()" style="display:none">${qz.qi<qs.length-1?'NEXT QUESTION →':'SEE RESULTS →'}</button>
      </div>
    </div>
  </div>`;
}

function selectOpt(i) {
  if (quizState.answered) return;
  selectedOpt = i;
  document.querySelectorAll('.option').forEach((el,j)=>el.classList.toggle('selected',j===i));
  document.getElementById('checkBtn').style.display='block';
}

function checkAnswer() {
  if (selectedOpt===null || quizState.answered) return;
  quizState.answered = true;
  const q = currentChapter.quiz[quizState.qi], fb = document.getElementById('feedback');
  document.querySelectorAll('.option').forEach((el,i)=>{
    el.classList.add('locked');
    if (i===q.correct) el.classList.add('correct');
    else if (i===selectedOpt) el.classList.add('wrong');
  });
  if (selectedOpt===q.correct) { quizState.score++; fb.className='feedback correct-fb show'; fb.innerHTML=`<strong>✓ Correct!</strong> ${q.explain}`; }
  else { fb.className='feedback wrong-fb show'; fb.innerHTML=`<strong>✗ Incorrect.</strong> ${q.explain}`; }
  document.getElementById('checkBtn').style.display='none';
  document.getElementById('nextQBtn').style.display='block';
  selectedOpt = null;
}

function nextQ() {
  quizState.qi++;
  quizState.answered = false;
  if (quizState.qi >= currentChapter.quiz.length) { quizState.finished=true; renderResult(); }
  else renderQuiz();
}

function renderResult() {
  const total=currentChapter.quiz.length, score=quizState.score, pct=Math.round(score/total*100);
  const msg = pct===100 ? "Perfect score! Chapter mastered." : pct>=80 ? "Excellent! Strong understanding." : pct>=60 ? "Good effort. Review missed sections." : "Keep studying — re-read the chapter.";
  if (pct>=60) { completed.add(currentChapter.id); save(); buildNav(); }
  document.getElementById('quizSection').innerHTML = `
  <div class="quiz-section">
    <div class="quiz-result">
      <div class="result-score">${score}/${total}</div>
      <div class="result-label">QUIZ COMPLETE — ${pct}% CORRECT</div>
      <div class="result-message">${msg}</div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="retake()">↺ RETAKE</button>
        ${currentChapter.id<chapters.length-1?`<button class="btn btn-primary" onclick="navigate(1)">NEXT CHAPTER →</button>`:`<button class="btn btn-success" onclick="showHome()">↩ HOME</button>`}
      </div>
    </div>
  </div>`;
}

function retake() { quizState={qi:0,answered:false,score:0,finished:false}; renderQuiz(); }

// ── MOBILE ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}
document.getElementById('overlay').addEventListener('click', closeSidebar);

// ── PWA ──
if ('serviceWorker' in navigator) {
  const sw = `const C='oop-v1';self.addEventListener('install',e=>e.waitUntil(caches.open(C).then(c=>c.addAll(['/']))));self.addEventListener('fetch',e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))))`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}

// ── INIT ──
showHome();
</script>
</body>
</html>
