<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#080c14">
<meta name="description" content="Learn OOP in PHP - From Beginner to Advanced">
<link rel="manifest" href="manifest.json">
<title>PHP::OOP — Master Object Oriented Programming</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080c14;
    --bg2: #0d1220;
    --bg3: #111827;
    --surface: #141c2e;
    --surface2: #1a2540;
    --border: #1e2d4a;
    --border2: #243354;
    --accent: #00d4ff;
    --accent2: #0099cc;
    --accent3: #00ff88;
    --accent4: #ff6b35;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --text3: #64748b;
    --glow: 0 0 20px rgba(0,212,255,0.3);
    --glow2: 0 0 40px rgba(0,212,255,0.15);
    --radius: 8px;
    --font-display: 'Orbitron', monospace;
    --font-mono: 'Space Mono', monospace;
    --font-body: 'Inter', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* GRID BACKGROUND */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* ─── LAYOUT ─── */
  #app { position: relative; z-index: 1; display: flex; min-height: 100vh; }

  /* ─── SIDEBAR ─── */
  #sidebar {
    width: 280px;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 100;
    transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto;
  }

  #sidebar::-webkit-scrollbar { width: 4px; }
  #sidebar::-webkit-scrollbar-track { background: transparent; }
  #sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

  .sidebar-header {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0;
    background: var(--bg2);
    z-index: 2;
  }

  .logo {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, var(--accent), var(--accent3));
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 900;
    color: var(--bg);
    flex-shrink: 0;
  }

  .logo-sub {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 1px;
    margin-top: 3px;
    font-weight: 400;
  }

  .progress-bar-wrap {
    margin-top: 14px;
    background: var(--border);
    border-radius: 2px;
    height: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 2px;
    transition: width 0.5s ease;
    box-shadow: 0 0 8px var(--accent);
  }

  .progress-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 1px;
    margin-top: 6px;
    display: flex;
    justify-content: space-between;
  }

  .nav-section { padding: 10px 0; }

  .nav-section-label {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--text3);
    padding: 10px 20px 6px;
    text-transform: uppercase;
  }

  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 20px;
    cursor: pointer;
    transition: all 0.15s;
    border-left: 2px solid transparent;
    position: relative;
  }

  .nav-item:hover { background: rgba(0,212,255,0.05); }

  .nav-item.active {
    background: rgba(0,212,255,0.08);
    border-left-color: var(--accent);
  }

  .nav-item.active .nav-title { color: var(--accent); }

  .nav-num {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--text3);
    width: 18px;
    flex-shrink: 0;
  }

  .nav-info { flex: 1; min-width: 0; }

  .nav-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .nav-badge {
    font-family: var(--font-mono);
    font-size: 8px;
    padding: 2px 6px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .badge-beginner { background: rgba(0,255,136,0.15); color: var(--accent3); }
  .badge-intermediate { background: rgba(0,212,255,0.15); color: var(--accent); }
  .badge-advanced { background: rgba(255,107,53,0.15); color: var(--accent4); }

  .nav-check {
    width: 14px; height: 14px;
    border: 1px solid var(--border2);
    border-radius: 50%;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px;
    transition: all 0.2s;
  }

  .nav-check.done {
    background: var(--accent3);
    border-color: var(--accent3);
    color: var(--bg);
    box-shadow: 0 0 8px rgba(0,255,136,0.4);
  }

  /* ─── MAIN ─── */
  #main {
    margin-left: 280px;
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── TOPBAR ─── */
  #topbar {
    position: sticky; top: 0; z-index: 50;
    background: rgba(8,12,20,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 32px;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  #menu-btn {
    display: none;
    background: none;
    border: 1px solid var(--border2);
    color: var(--text2);
    border-radius: var(--radius);
    padding: 6px 10px;
    cursor: pointer;
    font-size: 16px;
  }

  .chapter-crumb {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 1px;
  }

  .chapter-crumb span { color: var(--accent); }

  .topbar-actions { margin-left: auto; display: flex; gap: 8px; }

  .btn {
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 7px 16px;
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
    border: none;
    outline: none;
  }

  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border2);
  }

  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    font-weight: 700;
  }

  .btn-primary:hover {
    background: #00eeff;
    box-shadow: var(--glow);
    transform: translateY(-1px);
  }

  .btn-success {
    background: var(--accent3);
    color: var(--bg);
    font-weight: 700;
  }

  .btn-success:hover { box-shadow: 0 0 16px rgba(0,255,136,0.4); }

  /* ─── CONTENT ─── */
  #content {
    flex: 1;
    padding: 40px 32px;
    max-width: 860px;
    width: 100%;
  }

  /* ─── HERO ─── */
  .hero {
    padding: 60px 0 40px;
    position: relative;
  }

  .hero-tag {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .hero-tag::before {
    content: '';
    width: 24px; height: 1px;
    background: var(--accent);
  }

  .hero h1 {
    font-family: var(--font-display);
    font-size: clamp(28px, 4vw, 48px);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -1px;
    color: var(--text);
    margin-bottom: 16px;
  }

  .hero h1 .highlight {
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    font-size: 15px;
    color: var(--text2);
    line-height: 1.7;
    max-width: 600px;
    margin-bottom: 32px;
  }

  .hero-stats {
    display: flex;
    gap: 32px;
    flex-wrap: wrap;
  }

  .stat {
    font-family: var(--font-mono);
  }

  .stat-num {
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* ─── CHAPTER CARDS ─── */
  .chapters-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 16px;
    margin-top: 8px;
  }

  .chapter-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }

  .chapter-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s;
  }

  .chapter-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: var(--glow2); }
  .chapter-card:hover::before { transform: scaleX(1); }
  .chapter-card.completed { border-color: rgba(0,255,136,0.2); }
  .chapter-card.completed::before { transform: scaleX(1); background: var(--accent3); }

  .card-num {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .card-title {
    font-family: var(--font-display);
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.5px;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .card-desc {
    font-size: 12px;
    color: var(--text3);
    line-height: 1.5;
    margin-bottom: 12px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* ─── CHAPTER VIEW ─── */
  .chapter-view { animation: fadeUp 0.4s ease; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .chapter-header {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .chapter-header h2 {
    font-family: var(--font-display);
    font-size: clamp(20px, 3vw, 32px);
    font-weight: 900;
    color: var(--text);
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }

  .chapter-meta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    align-items: center;
    margin-top: 12px;
  }

  .meta-pill {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  /* ─── CONTENT BLOCKS ─── */
  .content-section {
    margin-bottom: 32px;
  }

  .content-section h3 {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .content-section h3::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .content-section p {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.8;
    margin-bottom: 12px;
  }

  .content-section ul {
    list-style: none;
    margin-bottom: 12px;
  }

  .content-section ul li {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.7;
    padding: 4px 0;
    padding-left: 20px;
    position: relative;
  }

  .content-section ul li::before {
    content: '▸';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-size: 10px;
    top: 7px;
  }

  /* ─── CODE BLOCK ─── */
  .code-wrap {
    background: #060a11;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin: 16px 0;
    position: relative;
  }

  .code-header {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .code-lang {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1px;
  }

  .code-copy {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    background: none;
    border: none;
    cursor: pointer;
    letter-spacing: 1px;
    transition: color 0.15s;
  }

  .code-copy:hover { color: var(--accent); }

  .code-body {
    padding: 20px;
    overflow-x: auto;
  }

  .code-body pre {
    font-family: var(--font-mono);
    font-size: 12px;
    line-height: 1.8;
    color: #cdd6f4;
    white-space: pre;
  }

  /* Syntax */
  .kw { color: #cba6f7; }
  .fn { color: #89b4fa; }
  .str { color: #a6e3a1; }
  .cm { color: var(--text3); font-style: italic; }
  .num { color: #fab387; }
  .cls { color: #f9e2af; }
  .var { color: #cdd6f4; }
  .op { color: #94e2d5; }
  .punc { color: #7f849c; }

  /* ─── CALLOUT ─── */
  .callout {
    border-radius: var(--radius);
    padding: 14px 18px;
    margin: 16px 0;
    border-left: 3px solid;
    font-size: 13px;
    line-height: 1.6;
  }

  .callout-info {
    background: rgba(0,212,255,0.08);
    border-color: var(--accent);
    color: var(--text2);
  }

  .callout-tip {
    background: rgba(0,255,136,0.08);
    border-color: var(--accent3);
    color: var(--text2);
  }

  .callout-warn {
    background: rgba(255,107,53,0.08);
    border-color: var(--accent4);
    color: var(--text2);
  }

  .callout strong {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 1px;
    display: block;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .callout-info strong { color: var(--accent); }
  .callout-tip strong { color: var(--accent3); }
  .callout-warn strong { color: var(--accent4); }

  /* ─── QUIZ ─── */
  .quiz-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-top: 32px;
  }

  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .quiz-title {
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 1px;
  }

  .quiz-progress-text {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 1px;
  }

  .question-block { animation: fadeUp 0.3s ease; }

  .question-num {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .question-text {
    font-size: 15px;
    color: var(--text);
    line-height: 1.6;
    margin-bottom: 20px;
    font-weight: 500;
  }

  .options { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    transition: all 0.15s;
    background: var(--bg3);
  }

  .option:hover:not(.locked) { border-color: var(--accent); background: rgba(0,212,255,0.05); }

  .option.selected { border-color: var(--accent); background: rgba(0,212,255,0.08); }
  .option.correct { border-color: var(--accent3); background: rgba(0,255,136,0.08); }
  .option.wrong { border-color: var(--accent4); background: rgba(255,107,53,0.08); }

  .option-letter {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text3);
    width: 20px;
    flex-shrink: 0;
    padding-top: 1px;
    font-weight: 700;
  }

  .option.selected .option-letter { color: var(--accent); }
  .option.correct .option-letter { color: var(--accent3); }
  .option.wrong .option-letter { color: var(--accent4); }

  .option-text { font-size: 13px; color: var(--text2); line-height: 1.5; }

  .feedback {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 16px;
    display: none;
  }

  .feedback.show { display: block; animation: fadeUp 0.25s ease; }
  .feedback.correct-fb { background: rgba(0,255,136,0.1); border: 1px solid rgba(0,255,136,0.2); color: var(--accent3); }
  .feedback.wrong-fb { background: rgba(255,107,53,0.1); border: 1px solid rgba(255,107,53,0.2); color: var(--accent4); }

  .quiz-actions { display: flex; gap: 12px; flex-wrap: wrap; }

  /* ─── QUIZ RESULT ─── */
  .quiz-result {
    text-align: center;
    padding: 20px 0;
    animation: fadeUp 0.4s ease;
  }

  .result-score {
    font-family: var(--font-display);
    font-size: 64px;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }

  .result-label {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .result-message {
    font-size: 14px;
    color: var(--text2);
    line-height: 1.6;
    margin-bottom: 24px;
    max-width: 400px;
    margin-inline: auto;
  }

  /* ─── NAV BUTTONS ─── */
  .nav-btns {
    display: flex;
    gap: 12px;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }

  /* ─── MOBILE ─── */
  #overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 90;
  }

  @media (max-width: 768px) {
    #sidebar {
      transform: translateX(-100%);
    }

    #sidebar.open {
      transform: translateX(0);
    }

    #main { margin-left: 0; }

    #menu-btn { display: block; }

    #content { padding: 24px 16px; }

    #topbar { padding: 12px 16px; }

    #overlay.show { display: block; }

    .hero { padding: 32px 0 24px; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  /* Section divider */
  .divider {
    height: 1px;
    background: linear-gradient(90deg, var(--accent), transparent);
    margin: 32px 0;
    opacity: 0.3;
  }

  .tag-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin: 16px 0;
  }

  .tag {
    font-family: var(--font-mono);
    font-size: 10px;
    padding: 3px 10px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 4px;
    color: var(--text2);
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div id="app">
  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">OOP</div>
        <div>
          <div>PHP::CLASS</div>

// ─── STATE ───────────────────────────────────────────
let currentView = 'home';
let currentChapter = null;
let quizState = {
  questionIndex: 0,
  answered: false,
  score: 0,
  finished: false
};
let completedChapters = new Set(JSON.parse(localStorage.getItem('completed') || '[]'));

// ─── UTILITIES ───────────────────────────────────────
function saveProgress() {
  localStorage.setItem('completed', JSON.stringify([...completedChapters]));
}

function getLevelBadge(level) {
  const map = { beginner: 'badge-beginner', intermediate: 'badge-intermediate', advanced: 'badge-advanced' };
  return `<span class="nav-badge ${map[level]}">${level.toUpperCase()}</span>`;
}

function getLevelPill(level) {
  const colors = { beginner: 'rgba(0,255,136,0.15)', intermediate: 'rgba(0,212,255,0.15)', advanced: 'rgba(255,107,53,0.15)' };
  const text = { beginner: 'var(--accent3)', intermediate: 'var(--accent)', advanced: 'var(--accent4)' };
  return `<span class="meta-pill" style="background:${colors[level]};color:${text[level]}">${level.toUpperCase()}</span>`;
}

function copyCode(btn) {
  const code = btn.closest('.code-wrap').querySelector('pre').innerText;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'COPIED!';
    setTimeout(() => btn.textContent = 'COPY', 2000);
  });
}

// ─── NAV ─────────────────────────────────────────────
function buildNav() {
  const levels = ['beginner', 'intermediate', 'advanced'];
  const labels = { beginner: '01 — BEGINNER', intermediate: '02 — INTERMEDIATE', advanced: '03 — ADVANCED' };

  let html = '';
  levels.forEach(level => {
    const chs = chapters.filter(c => c.level === level);
    html += `<div class="nav-section">
      <div class="nav-section-label">${labels[level]}</div>`;
    chs.forEach(ch => {
      const done = completedChapters.has(ch.id);
      html += `
      <div class="nav-item ${currentChapter?.id === ch.id ? 'active' : ''}" onclick="openChapter(${ch.id})" id="nav-${ch.id}">
        <span class="nav-num">${String(ch.id + 1).padStart(2,'0')}</span>
        <div class="nav-info">
          <div class="nav-title">${ch.title}</div>
        </div>
        ${getLevelBadge(ch.level)}
        <div class="nav-check ${done ? 'done' : ''}">${done ? '✓' : ''}</div>
      </div>`;
    });
    html += '</div>';
  });

  document.getElementById('navList').innerHTML = html;
  updateProgressBar();
}

function updateProgressBar() {
  const pct = Math.round((completedChapters.size / chapters.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${completedChapters.size} / ${chapters.length}`;
}

// ─── ROUTING ─────────────────────────────────────────
function showHome() {
  currentView = 'home';
  currentChapter = null;
  document.getElementById('crumb').innerHTML = `PHP::OOP &nbsp;/&nbsp; <span>Home</span>`;
  document.getElementById('prevBtn').style.display = 'none';
  document.getElementById('nextBtn').style.display = 'none';

  const grid = chapters.map(ch => {
    const done = completedChapters.has(ch.id);
    return `
    <div class="chapter-card ${done ? 'completed' : ''}" onclick="openChapter(${ch.id})">
      <div class="card-num">${String(ch.id + 1).padStart(2,'0')} / ${chapters.length}</div>
      <div class="card-title">${ch.icon} ${ch.title}</div>
      <div class="card-desc">${ch.desc}</div>
      <div class="card-footer">
        ${getLevelBadge(ch.level)}
        <span style="font-family:var(--font-mono);font-size:10px;color:${done ? 'var(--accent3)' : 'var(--text3)'}">${done ? '✓ DONE' : '→ START'}</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
  <div class="hero">
    <div class="hero-tag">PHP MASTERY COURSE</div>
    <h1>Master <span class="highlight">Object<br>Oriented</span> PHP</h1>
    <p>From beginner concepts to advanced design patterns. Each chapter includes theory, real-world code examples, and a quiz to test your understanding.</p>
    <div class="hero-stats">
      <div class="stat"><div class="stat-num">${chapters.length}</div><div class="stat-label">CHAPTERS</div></div>
      <div class="stat"><div class="stat-num">${chapters.reduce((a,c)=>a+c.quiz.length,0)}</div><div class="stat-label">QUIZ QUESTIONS</div></div>
      <div class="stat"><div class="stat-num">${completedChapters.size}</div><div class="stat-label">COMPLETED</div></div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="chapters-grid">${grid}</div>`;

  buildNav();
  closeSidebar();
}

function openChapter(id) {
  currentChapter = chapters[id];
  currentView = 'chapter';
  quizState = { questionIndex: 0, answered: false, score: 0, finished: false };

  document.getElementById('crumb').innerHTML = `PHP::OOP &nbsp;/&nbsp; <span>${currentChapter.title}</span>`;
  document.getElementById('prevBtn').style.display = id > 0 ? 'block' : 'none';
  document.getElementById('nextBtn').style.display = id < chapters.length - 1 ? 'block' : 'none';

  renderChapter();
  buildNav();
  closeSidebar();
  window.scrollTo(0, 0);
}

function navigate(dir) {
  if (!currentChapter) return;
  const newId = currentChapter.id + dir;
  if (newId >= 0 && newId < chapters.length) openChapter(newId);
}

// ─── CHAPTER RENDER ──────────────────────────────────
function renderChapter() {
  const ch = currentChapter;
  const c = ch.content;

  let sectionsHtml = '';
  c.sections.forEach(s => {
    let bulletsHtml = '';
    if (s.bullets) {
      bulletsHtml = `<ul>${s.bullets.map(b => `<li>${b}</li>`).join('')}</ul>`;
    }
    let codeHtml = '';
    if (s.code) {
      codeHtml = `
      <div class="code-wrap">
        <div class="code-header">
          <span class="code-lang">PHP</span>
          <button class="code-copy" onclick="copyCode(this)">COPY</button>
        </div>
        <div class="code-body"><pre>${s.code}</pre></div>
      </div>`;
    }
    sectionsHtml += `
    <div class="content-section">
      <h3>${s.heading}</h3>
      <p>${s.body}</p>
      ${bulletsHtml}
      ${codeHtml}
    </div>`;
  });

  let pillarsHtml = '';
  if (c.pillars) {
    pillarsHtml = `
    <div class="tag-row">
      ${c.pillars.map(p => `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:12px 16px;min-width:140px;flex:1">
        <div style="font-family:var(--font-mono);font-size:11px;color:var(--${p.color});font-weight:700;margin-bottom:4px">${p.name}</div>
        <div style="font-size:11px;color:var(--text3)">${p.desc}</div>
      </div>`).join('')}
    </div>`;
  }

  const callout = c.callout ? `
  <div class="callout callout-${c.callout.type}">
    <strong>${c.callout.title}</strong>
    ${c.callout.text}
  </div>` : '';

  document.getElementById('content').innerHTML = `
  <div class="chapter-view">
    <div class="chapter-header">
      <div style="font-family:var(--font-mono);font-size:10px;color:var(--text3);letter-spacing:2px;margin-bottom:8px">CHAPTER ${String(ch.id + 1).padStart(2,'0')}</div>
      <h2>${ch.icon} ${ch.title}</h2>
      <p style="font-size:14px;color:var(--text2);margin-top:8px;line-height:1.7">${c.intro}</p>
      <div class="chapter-meta">
        ${getLevelPill(ch.level)}
        <span class="meta-pill" style="background:rgba(0,212,255,0.1);color:var(--accent)">${ch.quiz.length} QUIZ QUESTIONS</span>
        ${completedChapters.has(ch.id) ? '<span class="meta-pill" style="background:rgba(0,255,136,0.1);color:var(--accent3)">✓ COMPLETED</span>' : ''}
      </div>
    </div>

    ${pillarsHtml}
    ${sectionsHtml}
    ${callout}

    <div id="quizSection"></div>

    <div class="nav-btns">
      ${ch.id > 0 ? `<button class="btn btn-ghost" onclick="navigate(-1)">← PREV CHAPTER</button>` : ''}
      ${ch.id < chapters.length - 1 ? `<button class="btn btn-primary" onclick="navigate(1)">NEXT CHAPTER →</button>` : '<button class="btn btn-success" onclick="showHome()">↩ ALL CHAPTERS</button>'}
    </div>
  </div>`;

  renderQuiz();
}

// ─── QUIZ ─────────────────────────────────────────────
function renderQuiz() {
  const qs = currentChapter.quiz;
  const qz = quizState;

  if (qz.finished) {
    renderQuizResult();
    return;
  }

  const q = qs[qz.questionIndex];
  const letters = ['A', 'B', 'C', 'D'];

  const optionsHtml = q.opts.map((opt, i) => `
  <div class="option" id="opt-${i}" onclick="selectOption(${i})">
    <span class="option-letter">${letters[i]}.</span>
    <span class="option-text">${opt}</span>
  </div>`).join('');

  document.getElementById('quizSection').innerHTML = `
  <div class="quiz-section">
    <div class="quiz-header">
      <div class="quiz-title">⬡ CHAPTER QUIZ</div>
      <div class="quiz-progress-text">QUESTION ${qz.questionIndex + 1} / ${qs.length}</div>
    </div>

    <div class="question-block">
      <div class="question-num">Q${qz.questionIndex + 1}</div>
      <div class="question-text">${q.q}</div>
      <div class="options">${optionsHtml}</div>

      <div class="feedback" id="feedback"></div>

      <div class="quiz-actions">
        <button class="btn btn-primary" id="checkBtn" onclick="checkAnswer()" style="display:none">CHECK ANSWER</button>
        <button class="btn btn-ghost" id="nextQBtn" onclick="nextQuestion()" style="display:none">
          ${qz.questionIndex < qs.length - 1 ? 'NEXT QUESTION →' : 'SEE RESULTS →'}
        </button>
      </div>
    </div>
  </div>`;
}

let selectedOpt = null;

function selectOption(i) {
  if (quizState.answered) return;
  selectedOpt = i;
  document.querySelectorAll('.option').forEach((el, j) => {
    el.classList.toggle('selected', j === i);
  });
  document.getElementById('checkBtn').style.display = 'block';
}

function checkAnswer() {
  if (selectedOpt === null || quizState.answered) return;
  quizState.answered = true;

  const q = currentChapter.quiz[quizState.questionIndex];
  const correct = q.correct;
  const fb = document.getElementById('feedback');

  document.querySelectorAll('.option').forEach((el, i) => {
    el.classList.add('locked');
    if (i === correct) el.classList.add('correct');
    else if (i === selectedOpt) el.classList.add('wrong');
  });

  if (selectedOpt === correct) {
    quizState.score++;
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = `<strong>✓ Correct!</strong> ${q.explain}`;
  } else {
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `<strong>✗ Incorrect.</strong> ${q.explain}`;
  }

  document.getElementById('checkBtn').style.display = 'none';
  document.getElementById('nextQBtn').style.display = 'block';
  selectedOpt = null;
}

function nextQuestion() {
  quizState.questionIndex++;
  quizState.answered = false;

  if (quizState.questionIndex >= currentChapter.quiz.length) {
    quizState.finished = true;
    renderQuizResult();
  } else {
    renderQuiz();
  }
}

function renderQuizResult() {
  const total = currentChapter.quiz.length;
  const score = quizState.score;
  const pct = Math.round((score / total) * 100);

  const msgs = {
    100: "Perfect score! You've mastered this chapter.",
    80: "Excellent work! You have a strong grasp of the material.",
    60: "Good effort! Review the sections you missed.",
    0: "Keep studying — go back and re-read the chapter."
  };

  let msg = msgs[0];
  if (pct === 100) msg = msgs[100];
  else if (pct >= 80) msg = msgs[80];
  else if (pct >= 60) msg = msgs[60];

  if (pct >= 60) {
    completedChapters.add(currentChapter.id);
    saveProgress();
    buildNav();
  }

  document.getElementById('quizSection').innerHTML = `
  <div class="quiz-section">
    <div class="quiz-result">
      <div class="result-score">${score}/${total}</div>
      <div class="result-label">QUIZ COMPLETE — ${pct}% CORRECT</div>
      <div class="result-message">${msg}</div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-ghost" onclick="retakeQuiz()">↺ RETAKE QUIZ</button>
        ${currentChapter.id < chapters.length - 1
          ? `<button class="btn btn-primary" onclick="navigate(1)">NEXT CHAPTER →</button>`
          : `<button class="btn btn-success" onclick="showHome()">↩ HOME</button>`}
      </div>
    </div>
  </div>`;
}

function retakeQuiz() {
  quizState = { questionIndex: 0, answered: false, score: 0, finished: false };
  renderQuiz();
}

// ─── MOBILE ──────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

document.getElementById('overlay').addEventListener('click', closeSidebar);

// ─── INIT ─────────────────────────────────────────────
showHome();
</script>

<!-- PWA manifest inline equivalent -->
<script>
// Register service worker for PWA
if ('serviceWorker' in navigator) {
  const sw = `
const CACHE = 'php-oop-v1';
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(['/'])));
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
});`;
  const blob = new Blob([sw], {type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
